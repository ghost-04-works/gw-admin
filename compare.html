<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- v20260630-013141 --><title>호환성 체크 — GEONWORKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff; --bg2: #f8f8f8; --bg3: #f2f2f2;
    --border: #e8e8e8; --border2: #d4d4d4;
    --text: #111111; --text2: #555555; --text3: #999999;
    --ok: #2d7a4f; --ok-bg: #f0faf4;
    --warn: #c47a00; --warn-bg: #fffbf0;
    --err: #c0392b; --err-bg: #fdf2f0;
    --sel: #111111;
    --r: 2px;
    --font: 'Noto Sans KR', sans-serif;
    --h-site: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: var(--h-site);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); z-index: 100;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .logo-text { font-size: 13px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; }
  .header-nav { font-size: 12px; color: var(--text3); letter-spacing: .05em; }

  /* ── MAIN LAYOUT: 4 columns ── */
  .main {
    display: grid;
    grid-template-columns: 140px 180px 1fr 280px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* footer — 데스크탑에서 숨김 */
  .site-footer { display: none; }

  /* ── LEFT: CAT PANEL ── */
  .cat-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .cat-sec {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    min-height: 0;
  }
  .cat-sec:last-child { border-bottom: none; }
  .cat-sec.active { background: var(--bg2); }

  .cat-sec-header {
    padding: 14px 14px 10px;
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    transition: background .12s;
  }
  .cat-sec-header:hover { background: rgba(0,0,0,.03); }

  .cat-sec-left { flex: 1; min-width: 0; }
  .cat-num { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: var(--text3); margin-bottom: 2px; }
  .cat-label { font-size: 9px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; }
  .cat-name { font-size: 14px; font-weight: 500; margin-top: 1px; }
  .cat-sel-text { font-size: 10px; color: var(--text2); margin-top: 3px; word-break: break-word; white-space: normal; }
  .cat-sel-text.empty { color: var(--text3); }
  .cat-check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: transparent; flex-shrink: 0;
    transition: all .15s; margin-top: 2px;
  }
  .cat-check.done { background: var(--sel); border-color: var(--sel); color: white; }

  /* ── FILTER PANEL ── */
  .filter-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  .filter-panel-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text3);
    flex-shrink: 0;
  }
  .filter-panel-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 8px 14px 16px;
    min-height: 0;
  }

  .fp-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 0;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .fp-row:last-child { border-bottom: none; }
  .fp-label {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    color: var(--text3); text-transform: uppercase;
  }
  .fp-chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .fchip {
    background: none; border: 1px solid var(--border2); border-radius: 2px;
    padding: 2px 7px; font-size: 10px; color: var(--text2);
    cursor: pointer; font-family: var(--font); transition: all .12s; white-space: nowrap;
  }
  .fchip:hover { border-color: var(--text); color: var(--text); }
  .fchip.on { background: var(--text); border-color: var(--text); color: white; }
  .fp-more {
    background: none; border: none; font-size: 10px; color: var(--text3);
    cursor: pointer; font-family: var(--font); padding: 2px 0;
  }
  .fp-more:hover { color: var(--text); }

  /* ── MIDDLE: GRID ── */
  .grid-panel {
    display: flex; flex-direction: column;
    height: 100%; overflow: hidden;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .grid-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .grid-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .grid-count { font-size: 11px; color: var(--text3); }
  .btn-reset-header {
    background: none; border: 1px solid var(--border2); border-radius: var(--r);
    padding: 4px 10px; font-size: 11px; color: var(--text2);
    cursor: pointer; font-family: var(--font); transition: all .12s;
  }
  .btn-reset-header:hover { border-color: var(--text); color: var(--text); }
  .btn-check-header {
    margin-left: auto;
    background: var(--sel); color: white;
    border: none; border-radius: var(--r);
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: var(--font); transition: opacity .12s;
  }
  .btn-check-header:hover { opacity: .85; }
  .btn-check-header:disabled { background: var(--border2); cursor: not-allowed; opacity: 1; }

  .products-wrap {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 0;
  }

  /* ── CARDS ── */
  .pcard {
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 8px 12px; cursor: pointer;
    transition: border-color .12s, background .12s;
    display: flex; align-items: center; gap: 10px;
  }
  .pcard:hover { border-color: var(--border2); background: var(--bg2); }
  .pcard.selected { border-color: var(--sel); background: var(--sel); color: white; }

  .pcard-img-wrap { position: relative; flex-shrink: 0; }
  .pcard-img { width: 80px; height: 80px; border-radius: 3px; object-fit: contain; display: block; background: var(--bg3); border: 1px solid var(--border); }
  .pcard.selected .pcard-img { border-color: rgba(255,255,255,.2); }
  .pcard-img-placeholder { width: 80px; height: 80px; border-radius: 3px; flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--border2); }

  /* 프리뷰 — fixed로 뷰포트 기준 고정, JS로 위치 계산 */
  #img-preview-popup {
    display: none;
    position: fixed;
    z-index: 1000;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
    border: 1px solid var(--border);
    background: white;
    pointer-events: none;
    width: 260px;
  }
  #img-preview-popup .pcard-img-preview-name {
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--font);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #img-preview-popup img {
    display: block;
    width: 260px;
    height: 180px;
    object-fit: contain;
    background: var(--bg3);
  }

  .pcard-main { flex: 1; min-width: 0; }
  .pcard-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pcard-opt { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pcard.selected .pcard-opt { color: rgba(255,255,255,.65); }

  .pcard-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
  .badge { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 6px; border-radius: 2px; background: var(--bg3); color: var(--text2); white-space: nowrap; border: 1px solid var(--border); }
  .pcard.selected .badge { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); border-color: rgba(255,255,255,.2); }

  .pcard-right { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-shrink: 0; }
  .pcard-logo { height: 22px; max-width: 100px; object-fit: contain; flex-shrink: 0; opacity: .9; }
  .pcard-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; transition: all .15s; }
  .pcard:hover .pcard-check { border-color: var(--text2); }
  .pcard.selected .pcard-check { background: white; border-color: white; color: var(--sel); }
  .pcard-link { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; color: var(--text3); text-decoration: none; transition: color .12s; border-radius: 2px; }
  .pcard-link:hover { color: var(--text); }
  .pcard.selected .pcard-link { color: rgba(255,255,255,.5); }
  .pcard.selected .pcard-link:hover { color: white; }

  .grid-empty { padding: 60px 20px; text-align: center; color: var(--text3); font-size: 13px; }

  /* ── RIGHT: RESULT PANEL ── */
  .result-panel {
    display: flex; flex-direction: column;
    height: 100%; overflow: hidden;
  }

  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-input {
    width: 100%; border: 1px solid var(--border2); border-radius: var(--r);
    padding: 7px 12px; font-size: 13px; font-family: var(--font);
    color: var(--text); background: var(--bg); outline: none; transition: border-color .12s;
  }
  .search-input:focus { border-color: var(--text); }
  .search-input::placeholder { color: var(--text3); }

  .result-scroll { flex: 1; overflow-y: auto; padding: 16px; }

  .result-title { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }

  .sel-summary { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
  .sel-row { display: flex; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--border); gap: 8px; min-height: 48px; }
  .sel-row:last-child { border-bottom: none; }
  .sel-row-cat { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); width: 38px; flex-shrink: 0; }
  .sel-row-info { flex: 1; min-width: 0; }
  .sel-row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sel-row-opt { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sel-row-empty { font-size: 12px; color: var(--text3); font-style: italic; }
  .sel-clear-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 2px; transition: color .12s; flex-shrink: 0; }
  .sel-clear-btn:hover { color: var(--text); }

  .compat-pending { padding: 20px 12px; text-align: center; background: var(--bg2); border-radius: var(--r); font-size: 12px; color: var(--text3); line-height: 1.8; }
  .compat-section { display: flex; flex-direction: column; gap: 10px; }
  .compat-pair { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .compat-pair-title { padding: 7px 10px; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .overall-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: none; }
  .overall-badge.ok { background: var(--ok-bg); color: var(--ok); }
  .overall-badge.warn { background: var(--warn-bg); color: var(--warn); }
  .overall-badge.err { background: var(--err-bg); color: var(--err); }
  .final-verdict { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--r); margin-bottom: 12px; border: 1px solid; }
  .final-verdict.ok { background: var(--ok-bg); border-color: var(--ok); }
  .final-verdict.warn { background: var(--warn-bg); border-color: var(--warn); }
  .final-verdict.err { background: var(--err-bg); border-color: var(--err); }
  .final-verdict-icon { font-size: 16px; font-weight: 700; flex-shrink: 0; line-height: 1.4; }
  .final-verdict.ok .final-verdict-icon { color: var(--ok); }
  .final-verdict.warn .final-verdict-icon { color: var(--warn); }
  .final-verdict.err .final-verdict-icon { color: var(--err); }
  .final-verdict-text { font-size: 13px; line-height: 1.4; font-weight: 600; }
  .final-verdict.ok .final-verdict-text { color: var(--ok); }
  .final-verdict.warn .final-verdict-text { color: var(--warn); }
  .final-verdict.err .final-verdict-text { color: var(--err); }
  .check-row { display: flex; align-items: flex-start; gap: 7px; padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
  .check-row:last-child { border-bottom: none; }
  .check-icon { font-size: 9px; font-weight: 700; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .check-icon.ok { background: var(--ok-bg); color: var(--ok); }
  .check-icon.warn { background: var(--warn-bg); color: var(--warn); }
  .check-icon.err { background: var(--err-bg); color: var(--err); }
  .check-field { font-size: 10px; color: var(--text3); width: 68px; flex-shrink: 0; padding-top: 1px; font-weight: 500; }
  .check-msg { flex: 1; color: var(--text2); line-height: 1.5; }

  .result-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 8px; }
  .btn-check-compat {
    flex: 1;
    background: var(--sel); color: white;
    border: none; border-radius: var(--r);
    padding: 8px 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    transition: opacity .12s;
  }
  .btn-check-compat:hover { opacity: .85; }
  .btn-check-compat:disabled { background: var(--border2); cursor: not-allowed; opacity: 1; }
  .btn-clear-all { flex: 1; padding: 8px; background: none; border: 1px solid var(--border2); border-radius: var(--r); font-size: 12px; color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .12s; }
  .btn-clear-all:hover { border-color: var(--text); color: var(--text); }
  .btn-top { display: none; padding: 8px 12px; background: none; border: 1px solid var(--border2); border-radius: var(--r); font-size: 12px; color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .12s; white-space: nowrap; }
  .btn-top:hover { border-color: var(--text); color: var(--text); }

  /* mobile dropdown */
  .grid-title-wrap { position: relative; display: flex; align-items: center; gap: 4px; }
  .grid-title-arrow { display: none; font-size: 10px; color: var(--text3); }
  .cat-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,.1); z-index: 100; min-width: 130px; overflow: hidden; }
  .cat-dropdown.open { display: block; }
  .cat-dropdown-item { padding: 9px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; }
  .cat-dropdown-item:last-child { border-bottom: none; }
  .cat-dropdown-item:hover { background: var(--bg2); color: var(--text); }
  .cat-dropdown-item.active { color: var(--text); font-weight: 500; }
  .cat-dropdown-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .cat-dropdown-item.active .cat-dropdown-dot { background: var(--text); }

  /* grouped card */
  .pcard-group { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; width: 100%; display: block; flex-shrink: 0; }
  .pcard-group > .pcard { border: none; border-radius: 0; border-top: 1px solid var(--border); width: 100%; box-sizing: border-box; display: none; }
  .pcard-group.open > .pcard { display: flex; }
  .pcard-group-header {
    padding: 10px 14px;
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 48px;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .pcard-group-header:hover { background: var(--bg3); }
  .pcard-group-chevron { margin-left: auto; font-size: 11px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
  .pcard-group.open .pcard-group-chevron { transform: rotate(180deg); }
  .pcard-group-img {
    width: 48px; height: 48px;
    border-radius: 3px; object-fit: contain;
    background: var(--bg3); border: 1px solid var(--border);
    flex-shrink: 0; display: block;
  }
  .pcard-group-img-placeholder {
    width: 48px; height: 48px;
    border-radius: 3px; background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--border2); flex-shrink: 0;
  }
  .pcard-group-info { flex: 1; min-width: 0; }
  .pcard-group-title { font-size: 13px; font-weight: 600; }
  .pcard-group-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* footer */
  .site-footer { border-top: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }
  .footer-logo { font-weight: 700; letter-spacing: .12em; }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    html, body { height: auto; overflow: auto; }
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
      flex: none;
      height: auto;
      overflow: visible;
    }
    .site-footer { display: flex; }

    /* 카테고리 — 가로 탭 */
    .cat-panel {
      height: auto;
      flex-direction: row;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .cat-sec {
      flex: 1;
      flex-direction: column;
      border-bottom: none;
      border-right: 1px solid var(--border);
      min-height: 64px;
    }
    .cat-sec:last-child { border-right: none; }
    .cat-sec-header { padding: 10px 10px 8px; flex: 1; }
    .cat-name { font-size: 13px; }
    .cat-num { display: none; }

    /* 필터 */
    .filter-panel {
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: column;
    }
    .filter-panel-header { display: none; }
    .filter-panel-body {
      padding: 8px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .fp-row {
      flex-direction: row;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 0;
    }
    .fp-label { width: 52px; padding-top: 3px; flex-shrink: 0; }

    /* 그리드 */
    .grid-panel { height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .products-wrap { overflow-y: visible; max-height: none; }

    /* 결과 패널 */
    .result-panel { height: auto; }
    .result-scroll { overflow-y: visible; }

    .grid-title-arrow { display: inline; }
    .grid-title-wrap { cursor: pointer; }
    .btn-top { display: block; }
    .header-nav { display: none; }
    .site-footer { flex-direction: column; gap: 6px; padding: 16px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="https://geonworks.cafe24.com/skin-skin3" class="logo">
    <svg width="20" height="20" viewBox="0 0 596 842" fill="#111" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd">
      <g transform="translate(-9.3635,-817.6605)">

const CASES=DATA.cases,PCBS=DATA.pcbs,PLATES=DATA.plates;

const chk=(s,f,m)=>({status:s,field:f,msg:m});
const inter=(a,b)=>a.filter(x=>b.includes(x));
const hasAny=(a,b)=>a.some(x=>b.includes(x));

function checkCasePCB(c,p){
  const r=[];
  c.size!==p.size?r.push(chk('err','Size',`케이스 <b>${c.size}</b> ↔ PCB <b>${p.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${c.size}</b> 일치`));
  if(!c.fLayerNone&&!p.fLayerNone){
    c.fLayer.some(f=>p.fLayer.includes(f))?r.push(chk('ok','F Layer',`케이스 <b>${c.fLayer[0]}</b> — PCB 지원`)):r.push(chk('err','F Layer',`케이스 <b>${c.fLayer[0]}</b> — PCB 미지원 (${p.fLayer.join(', ')})`));
  }
  const compatOk=p.compatibleCase.includes(c.id);
  if(compatOk)r.push(chk('ok','Compatible Case',`<b>${c.name}</b> 호환 목록 포함`));
  else r.push(chk('err','Compatible Case',`<b>${c.name}</b> 호환 목록에 없음 — 이 PCB와 호환되지 않습니다`));
  const brOk=inter(c.bottomRow,p.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(c.bottomRow.includes('WKL')&&p.bottomRow.includes('WK')&&p.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL 케이스 + WK PCB — <b>7U</b> 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 지원 Bottom Row 없음`));
  r.push(chk('ok','Spacebar',`PCB 지원: <b>${p.spacebar.join(', ')}</b>`));
  const reqDB=c.dbBoards;
  if(c.dbDirect&&reqDB.length===0){
    p.usbConnector?r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능`)):r.push(chk('err','Connection',`케이스 USB 직결 전용 — PCB USB 커넥터 없음`));
  }else if(!c.dbDirect&&reqDB.length>0){
    const oc=p.otherConnector||'';
    const avail=oc.includes('(included)')?'in':oc.includes('(solderable)')?'sol':'none';
    const dbName=oc.replace(/\s*\(.*\)/,'');
    if(avail==='none')r.push(chk('err','Connection',`도터보드 연결 불가 — PCB 커넥터 없음`));
    else if(avail==='sol')r.push(chk('warn','Connection',`<b>${dbName}</b> 커넥터 납땜 필요, <b>${reqDB.join(', ')}</b> 별도 구매 필요`));
    else{
      const inc=p.daughterboard!=='Not Included'&&reqDB.some(d=>p.daughterboard.toLowerCase().includes(d.toLowerCase().split(' ')[0]));
      inc?r.push(chk('ok','Connection',`<b>${p.daughterboard}</b> 동봉`)):r.push(chk('warn','Connection',`<b>${reqDB.join(', ')}</b> 별도 구매 필요`));
    }
  }else if(c.dbDirect&&reqDB.length>0){
    if(p.usbConnector){
      const oc=p.otherConnector||'';
      const avail=oc.includes('(included)')?'in':oc.includes('(solderable)')?'sol':'none';
      const dbName=oc.replace(/\s*\(.*\)/,'');
      if(avail==='in')r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능 (<b>${reqDB.join(', ')}</b> 연결도 가능)`));
      else if(avail==='sol')r.push(chk('warn','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능 (<b>${reqDB.join(', ')}</b> 연결 시 <b>${dbName}</b> 납땜 필요)`));
      else r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능`));
    }else{
      const oc=p.otherConnector||'';
      oc.includes('(included)')||oc.includes('(solderable)')?r.push(chk('warn','Connection',`USB 직결 불가 — <b>${reqDB.join(', ')}</b> 별도 구매 필요`)):r.push(chk('err','Connection',`연결 방법 없음`));
    }
  }else{r.push(chk('err','Connection',`연결 방식 정보 없음`));}
  return r;
}

function checkCasePlate(c,pl){
  const r=[];
  c.size!==pl.size?r.push(chk('err','Size',`케이스 <b>${c.size}</b> ↔ 보강판 <b>${pl.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${c.size}</b> 일치`));
  pl.compatibleCase.includes(c.id)?r.push(chk('ok','Compatible Case',`<b>${c.name}</b> 호환 목록 포함`)):r.push(chk('err','Compatible Case',`<b>${c.name}</b> 호환 목록에 없음 — 이 보강판과 호환되지 않습니다`));
  if(!c.fLayerNone&&!pl.fLayerNone)
    c.fLayer.some(f=>pl.fLayer.includes(f))?r.push(chk('ok','F Layer',`케이스 <b>${c.fLayer[0]}</b> 지원`)):r.push(chk('err','F Layer',`케이스 <b>${c.fLayer[0]}</b> — 보강판 미지원`));
  const brOk=inter(c.bottomRow,pl.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(c.bottomRow.includes('WKL')&&pl.bottomRow.includes('WK')&&pl.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL 케이스 + WK 보강판 — 7U 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 Bottom Row 없음`));
  if(pl.plateType==='Plateless')
    c.platelessSupport==='Yes'?r.push(chk('ok','Plateless',`케이스 Plateless 지원`)):r.push(chk('err','Plateless',`케이스 Plateless 미지원`));
  return r;
}

function checkPCBPlate(p,pl){
  const r=[];
  const commonCase=p.compatibleCase.filter(id=>pl.compatibleCase.includes(id));
  if(commonCase.length>0){
    const names=commonCase.map(id=>{const c=CASES.find(x=>x.id===id);return c?c.name:id;});
    r.push(chk('ok','Compatible Case',`공통 호환 케이스: <b>${names.join(', ')}</b>`));
  }
  else r.push(chk('err','Compatible Case',`공통 호환 케이스 없음 — PCB와 보강판이 서로 다른 케이스용입니다`));
  p.size!==pl.size?r.push(chk('err','Size',`PCB <b>${p.size}</b> ↔ 보강판 <b>${pl.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${p.size}</b> 일치`));
  if(!p.fLayerNone&&!pl.fLayerNone){
    const c=inter(p.fLayer,pl.fLayer);
    c.length>0?r.push(chk('ok','F Layer',`공통: <b>${c.join(', ')}</b>`)):r.push(chk('err','F Layer',`공통 F Layer 없음`));
  }
  const brOk=inter(p.bottomRow,pl.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(p.bottomRow.includes('WKL')&&pl.bottomRow.includes('WK')&&pl.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL PCB + WK 보강판 — 7U 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 Bottom Row 없음`));
  const sbOk=inter(p.spacebar,pl.spacebar);
  sbOk.length>0?r.push(chk('ok','Spacebar',`공통 지원: <b>${sbOk.join(', ')}</b>`)):r.push(chk('err','Spacebar',`공통 Spacebar 없음`));
  if(p.type==='Hall Effect')
    pl.heCompatible==='Yes'?r.push(chk('ok','HE Compatible',`Hall Effect PCB 호환 보강판`)):r.push(chk('err','HE Compatible',`HE PCB 전용 보강판 아님`));
  if(pl.plateType==='Plateless'){
    if(p.platelessSupport==='Yes')r.push(chk('ok','Plateless',`PCB Plateless 지원`));
    else if(p.platelessSupport==='Not Recommended')r.push(chk('warn','Plateless',`Plateless 권장 안함 — 두께 <b>${p.thickness}</b>`));
    else r.push(chk('err','Plateless',`Plateless 불가 — 두께 <b>${p.thickness}</b>`));
  }
  return r;
}

  if (/venom.*he/i.test(name)) return LOGO_VENOM_HE_SEL;
  if (/venom.*mx/i.test(name)) return LOGO_VENOM_MX_SEL;

// ── UI STATE ──
let sel = { case: null, plate: null, pcb: null };
let openPanel = 'case';
let fSize = 'all', fSub = 'all', fRgb = 'all', fSb = 'all';
let searchQ = '';

function getData(cat) {
  return cat === 'case' ? CASES : cat === 'pcb' ? PCBS : PLATES;
}
// ── 정규화 매핑 ──
const SIZE_GROUPS = ['40%','60%','65%','70%','80%'];
function normSize(size) {
  return SIZE_GROUPS.includes(size) ? size : '기타';
}

const MOUNT_GROUPS = {
  'Top Mount': ['Top Mount', 'Isolated Top Mount', 'Split-plate Top Mount'],
  'Gasket Mount': ['Gasket Mount', 'Gasket Isolation Mount', 'Isolated Sandwich Gasket Mount', 'Silicone Gasket Mount', 'Spring Gasket Mount'],
  'O-ring Mount': ['O-ring Mount', 'Gummy O-ring Mount', 'O-ring Gasket Mount'],
  'Tadpole Mount': ['Tadpole Mount', 'Silicon pin/ Tadpole Mount'],
  'Tray Mount': ['Tray Mount'],
};
const MOUNT_ORDER = ['Top Mount','Gasket Mount','O-ring Mount','Tadpole Mount','Tray Mount','기타'];
function normMountList(mountingStyle) {
  const raws = mountingStyle.split(',').map(s => s.trim()).filter(Boolean);
  const groups = new Set();
  raws.forEach(raw => {
    let matched = null;
    for (const [group, members] of Object.entries(MOUNT_GROUPS)) {
      if (members.includes(raw)) { matched = group; break; }
    }
    groups.add(matched || '기타');
  });
  return [...groups];
}

const MATERIAL_GROUPS = {
  'Aluminum': ['Aluminum'],
  'FR4': ['FR4', 'FR-4'],
  'Carbon Fiber': ['Carbon Fiber'],
  'PC': ['PC'],
  'PP': ['PP'],
};
const MATERIAL_ORDER = ['Aluminum','FR4','Carbon Fiber','PC','PP','기타'];
function normMaterial(material) {
  for (const [group, members] of Object.entries(MATERIAL_GROUPS)) {
    if (members.includes(material)) return group;
  }
  return '기타';
}

function getSizes(cat) {
  return ['all', ...SIZE_GROUPS, '기타'];
}
function getSubOpts(cat) {
  if (cat === 'case') {
    return { label: 'MOUNT', vals: MOUNT_ORDER };
  }
  if (cat === 'plate') {
    return { label: 'MATERIAL', vals: MATERIAL_ORDER };
  }
  if (cat === 'pcb') {
    const vals = [...new Set(PCBS.map(p => p.type))].filter(Boolean).sort();
    return { label: 'TYPE', vals };
  }
  return null;
}

// ── TOGGLE FILTERS ──
function toggleSize(v) { fSize = fSize === v ? 'all' : v; renderFilters(); renderGrid(); }
function toggleSub(v)  { fSub  = fSub  === v ? 'all' : v; renderFilters(); renderGrid(); }
function toggleRgb(v)  { fRgb  = fRgb  === v ? 'all' : v; renderFilters(); renderGrid(); }
function toggleSb(v)   { fSb   = fSb   === v ? 'all' : v; renderFilters(); renderGrid(); }

// ── PANEL ──
function setPanel(cat) {
  openPanel = cat;
  fSize = 'all'; fSub = 'all'; fRgb = 'all'; fSb = 'all';
  window._fexp_sub = false;
  ['case','plate','pcb'].forEach(c => {
    document.getElementById('cat-sec-' + c).classList.toggle('active', c === cat);
  });
  renderFilters();
  renderGrid();
}

// ── SELECT ──
function selectPart(cat, id) {
  const part = getData(cat).find(p => p.id === id);
  sel[cat] = (sel[cat] && sel[cat].id === id) ? null : part;
  updateCatLabels();
  renderGrid();
  renderResult();
}

function clearAll() {
  sel = { case: null, plate: null, pcb: null };
  searchQ = '';
  fSize = 'all'; fSub = 'all'; fRgb = 'all'; fSb = 'all';
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  updateCatLabels();
  renderFilters();
  renderResult();
  setPanel(openPanel);
}

// ── CAT LABELS ──
function updateCatLabels() {
  ['case','plate','pcb'].forEach(cat => {
    const nameEl = document.getElementById('cat-sel-' + cat);
    const checkEl = document.getElementById('cat-check-' + cat);
    if (sel[cat]) {
      const p = sel[cat];
      const label = p.name + (p.option ? ' / ' + p.option : '');
      nameEl.textContent = label;
      nameEl.classList.remove('empty');
      checkEl.classList.add('done');
      checkEl.innerHTML = '✓';
    } else {
      nameEl.textContent = '선택 안됨';
      nameEl.classList.add('empty');
      checkEl.classList.remove('done');
      checkEl.innerHTML = '';
    }
  });
}

// ── FILTERS (rendered inside cat panel) ──
function renderFilters() {
  const cat = openPanel;
  const fw = document.getElementById('filter-panel-body');
  const titleEl = document.getElementById('filter-panel-title');
  if (!fw) return;

  const titles = { case: 'CASE 필터', plate: 'PLATE 필터', pcb: 'PCB 필터' };
  if (titleEl) titleEl.textContent = titles[cat];

  const sizes = getSizes(cat);
  const subOpts = getSubOpts(cat);
  let html = '';

  // SIZE
  if (sizes.length > 2) {
    html += `<div class="fp-row"><span class="fp-label">SIZE</span><div class="fp-chips">` +
      `<button class="fchip${fSize==='all'?' on':''}" onclick="fSize='all';renderFilters();renderGrid()">전체</button>` +
      sizes.filter(s=>s!=='all').map(sz=>`<button class="fchip${fSize===sz?' on':''}" onclick="toggleSize('${sz}')">${sz}</button>`).join('') +
      `</div></div>`;
  }

  // sub
  if (subOpts && subOpts.vals.length > 1) {
    const exp = !!window._fexp_sub;
    const SHOW = 6;
    const visible = (!exp && subOpts.vals.length > SHOW) ? subOpts.vals.slice(0, SHOW) : subOpts.vals;
    const moreBtn = subOpts.vals.length > SHOW
      ? `<button class="fp-more" onclick="window._fexp_sub=!window._fexp_sub;renderFilters()">${exp ? '∧ 접기' : '펼치기 ∨'}</button>`
      : '';
    html += `<div class="fp-row"><span class="fp-label">${subOpts.label}</span><div class="fp-chips">` +
      `<button class="fchip${fSub==='all'?' on':''}" onclick="fSub='all';renderFilters();renderGrid()">전체</button>` +
      visible.map(v=>{const e=v.replace(/'/g,"\\'");return `<button class="fchip${fSub===v?' on':''}" onclick="toggleSub('${e}')">${v}</button>`;}).join('') +
      `</div>${moreBtn}</div>`;
  }

  if (cat === 'pcb') {
    // RGB: No RGB / RGB (Underglow → RGB로 합산)
    html += `<div class="fp-row"><span class="fp-label">RGB</span><div class="fp-chips">` +
      `<button class="fchip${fRgb==='all'?' on':''}" onclick="fRgb='all';renderFilters();renderGrid()">전체</button>` +
      `<button class="fchip${fRgb==='No RGB'?' on':''}" onclick="toggleRgb('No RGB')">RGB ✕</button>` +
      `<button class="fchip${fRgb==='RGB'?' on':''}" onclick="toggleRgb('RGB')">RGB ○</button>` +
      `</div></div>`;

    // Spacebar: 6.25U / 7U / 기타
    html += `<div class="fp-row"><span class="fp-label">SPACEBAR</span><div class="fp-chips">` +
      `<button class="fchip${fSb==='all'?' on':''}" onclick="fSb='all';renderFilters();renderGrid()">전체</button>` +
      `<button class="fchip${fSb==='6.25U'?' on':''}" onclick="toggleSb('6.25U')">6.25U</button>` +
      `<button class="fchip${fSb==='7U'?' on':''}" onclick="toggleSb('7U')">7U</button>` +
      `<button class="fchip${fSb==='기타'?' on':''}" onclick="toggleSb('기타')">기타</button>` +
      `</div></div>`;
  }

  fw.innerHTML = html;
}

// ── GRID ──
function buildCardHTML(p, cat) {
  const isSel = sel[cat] && sel[cat].id === p.id;
  const displayName = cat === 'plate' ? (p.name + ' ' + p.option) : p.name;
  const displayOpt = cat === 'plate' ? '' : (p.option || '');

  const safeImg = (p.imageUrl||'').replace(/'/g,"\\'");
  const safeName = displayName.replace(/'/g,"\\'");
  const imgHTML = p.imageUrl
    ? `<div class="pcard-img-wrap" onmouseenter="showPreview(event,'${safeImg}','${safeName}',this)" onmouseleave="hidePreview()"><img class="pcard-img" src="${p.imageUrl}" alt="" loading="lazy" onerror="this.parentElement.className='pcard-img-placeholder';this.parentElement.innerHTML='⌨'"></div>`
    : `<div class="pcard-img-placeholder">⌨</div>`;

  const linkHTML = p.productUrl
    ? `<a class="pcard-link" href="${p.productUrl}" target="_blank" title="제품 페이지" onclick="event.stopPropagation()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`
    : '';

  let badges = [];
  if (cat === 'case') {
    badges.push(`<span class="badge">${p.size}</span>`);
    if (p.bottomRow&&p.bottomRow.length) badges.push(`<span class="badge">${p.bottomRow.join(' · ')}</span>`);
    if (p.fLayer&&p.fLayer.length) badges.push(`<span class="badge">${p.fLayer.join(' · ')}</span>`);
    if (p.dbBoards&&p.dbBoards.length) badges.push(`<span class="badge">${p.dbBoards.join(', ')}</span>`);
    if (p.mountingStyle) badges.push(`<span class="badge">${p.mountingStyle}</span>`);
  } else if (cat === 'plate') {
    badges.push(`<span class="badge">${p.size}</span>`);
    if (p.heCompatible==='Yes') badges.push(`<span class="badge">HE Compatible</span>`);
    if (p.material) badges.push(`<span class="badge">${p.material}</span>`);
    if (p.plateType) badges.push(`<span class="badge">${p.plateType}</span>`);
    if (p.bottomRow&&p.bottomRow.length) badges.push(`<span class="badge">${p.bottomRow.join(' · ')}</span>`);
    if (p.spacebar&&p.spacebar.length) badges.push(`<span class="badge">Spacebar ${p.spacebar.join(' · ')}</span>`);
    if (p.thickness) badges.push(`<span class="badge">${p.thickness}</span>`);
  } else {
    badges.push(`<span class="badge">${p.size}</span>`);
    if (p.type) badges.push(`<span class="badge">${p.type}</span>`);
    if (p.material) badges.push(`<span class="badge">${p.material}</span>`);
    if (p.thickness) badges.push(`<span class="badge">${p.thickness}</span>`);
    if (p.bottomRow&&p.bottomRow.length) badges.push(`<span class="badge">${p.bottomRow.join(' · ')}</span>`);
    if (p.spacebar&&p.spacebar.length) badges.push(`<span class="badge">Spacebar ${p.spacebar.join(' · ')}</span>`);
    if (p.rgb) badges.push(`<span class="badge">${p.rgb}</span>`);
    if (p.usbConnector) badges.push(`<span class="badge">${p.usbConnector}</span>`);
  }
  const badgesHTML = badges.length ? `<div class="pcard-badges">${badges.join('')}</div>` : '';
  const venomLogo = cat === 'pcb' ? (isSel ? getVenomLogoSel(p.name) : getVenomLogo(p.name)) : null;
  const logoHTML = venomLogo ? `<img class="pcard-logo" src="${venomLogo}" alt="logo">` : '';

  return `<div class="pcard${isSel?' selected':''}" onclick="selectPart('${cat}','${p.id}')">${imgHTML}<div class="pcard-main"><div class="pcard-name">${displayName}</div>${displayOpt?`<div class="pcard-opt">${displayOpt}</div>`:''} ${badgesHTML}</div><div class="pcard-right">${logoHTML}<div class="pcard-check">${isSel?'✓':''}</div>${linkHTML}</div></div>`;
}

function renderGrid() {
  const cat = openPanel;
  let parts = getData(cat);

  if (fSize !== 'all') parts = parts.filter(p => normSize(p.size) === fSize);
  if (fSub !== 'all') {
    if (cat === 'case') parts = parts.filter(p => normMountList(p.mountingStyle).includes(fSub));
    else if (cat === 'plate') parts = parts.filter(p => normMaterial(p.material) === fSub);
    else if (cat === 'pcb') parts = parts.filter(p => p.type === fSub);
  }
  if (cat === 'pcb' && fRgb !== 'all') {
    if (fRgb === 'RGB') parts = parts.filter(p => p.rgb === 'RGB' || p.rgb === 'Underglow');
    else parts = parts.filter(p => p.rgb === fRgb);
  }
  if (cat === 'pcb' && fSb !== 'all') {
    if (fSb === '기타') parts = parts.filter(p => p.spacebar && p.spacebar.some(v => v !== '6.25U' && v !== '7U'));
    else parts = parts.filter(p => p.spacebar && p.spacebar.includes(fSb));
  }
  if (searchQ.trim()) {
    const q = searchQ.trim().toLowerCase();
    parts = parts.filter(p => (p.name + ' ' + (p.option||'')).toLowerCase().includes(q));
  }

  const titles = { case: '하우징', plate: '보강판', pcb: 'PCB' };
  document.getElementById('grid-title-text').textContent = titles[cat] + ' 선택';
  document.getElementById('grid-count').textContent = parts.length + '개';

  const wrap = document.getElementById('products-wrap');
  wrap.innerHTML = '';

  if (!parts.length) {
    wrap.innerHTML = '<div class="grid-empty">검색 결과가 없습니다.</div>';
    return;
  }

  // case: 그룹핑 없이 카드만
  if (cat === 'case') {
    wrap.innerHTML = parts.map(p => buildCardHTML(p, cat)).join('');
    return;
  }

  // plate/pcb: skuBase 기준 그룹핑 — DOM append 방식
  const groupMap = new Map();
  const groupOrder = [];
  parts.forEach(p => {
    const key = p.skuBase || p.id;
    if (!groupMap.has(key)) { groupMap.set(key, []); groupOrder.push(key); }
    groupMap.get(key).push(p);
  });

  groupOrder.forEach(key => {
    const group = groupMap.get(key);

    if (group.length === 1) {
      // 단일 아이템 — 카드 직접 append
      const div = document.createElement('div');
      div.innerHTML = buildCardHTML(group[0], cat);
      wrap.appendChild(div.firstElementChild);
      return;
    }

    // 다중 아이템 — 그룹 박스 생성
    const first = group[0];
    const box = document.createElement('div');
    box.className = 'pcard-group';

    // 헤더
    const header = document.createElement('div');
    header.className = 'pcard-group-header';
    header.onclick = () => box.classList.toggle('open');

    if (first.imageUrl) {
      const img = document.createElement('img');
      img.className = 'pcard-group-img';
      img.src = first.imageUrl;
      img.loading = 'lazy';
      header.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'pcard-group-img-placeholder';
      ph.textContent = '⌨';
      header.appendChild(ph);
    }

    const info = document.createElement('div');
    info.className = 'pcard-group-info';
    info.innerHTML = `<div class="pcard-group-title">${first.name}</div><div class="pcard-group-sub">${group.length}가지 옵션</div>`;
    header.appendChild(info);

    const chevron = document.createElement('div');
    chevron.className = 'pcard-group-chevron';
    chevron.textContent = '▼';
    header.appendChild(chevron);
    box.appendChild(header);

    // 옵션 카드들
    group.forEach(p => {
      const tmp = document.createElement('div');
      tmp.innerHTML = buildCardHTML(p, cat);
      box.appendChild(tmp.firstElementChild);
    });

    // 선택된 항목이 이 그룹 안에 있으면 자동 열기
    if (sel[cat] && group.some(p => p.id === sel[cat].id)) {
      box.classList.add('open');
    }

    wrap.appendChild(box);
  });
}


// ── RESULT ──
function ovSt(checks){
  if(!checks||!checks.length)return'none';
  if(checks.some(c=>c.status==='err'))return'err';
  if(checks.some(c=>c.status==='warn'))return'warn';
  return'ok';
}
function getChecks(cat,part){
  const r=[];
  if(cat==='case'){if(sel.pcb)r.push(...checkCasePCB(part,sel.pcb));if(sel.plate)r.push(...checkCasePlate(part,sel.plate));}
  else if(cat==='pcb'){if(sel.case)r.push(...checkCasePCB(sel.case,part));if(sel.plate)r.push(...checkPCBPlate(part,sel.plate));}
  else{if(sel.case)r.push(...checkCasePlate(sel.case,part));if(sel.pcb)r.push(...checkPCBPlate(sel.pcb,part));}
  return r;
}

function updateCompatBtn() {
  const btn = document.getElementById('btn-check-compat');
  const btnSm = document.getElementById('btn-check-compat-sm');
  const selCount = Object.values(sel).filter(Boolean).length;
  if (btn) btn.disabled = selCount < 2;
  if (btnSm) btnSm.disabled = selCount < 2;
}

function runCompatCheck() {
  const icons = { ok:'✓', warn:'!', err:'✕' };
  const stLabel = { ok:'호환 가능', warn:'조건부 호환', err:'호환 불가' };
  const pairs = [];
  if (sel.case && sel.pcb)   pairs.push({ label:'CASE × PCB',   checks:checkCasePCB(sel.case,sel.pcb) });
  if (sel.case && sel.plate) pairs.push({ label:'CASE × PLATE', checks:checkCasePlate(sel.case,sel.plate) });
  if (sel.pcb  && sel.plate) pairs.push({ label:'PCB × PLATE',  checks:checkPCBPlate(sel.pcb,sel.plate) });

  const allChecks = pairs.flatMap(p => p.checks.map(c => ({...c, pairLabel: p.label})));
  const finalSt = ovSt(allChecks);
  const finalIcon = { ok:'✓', warn:'!', err:'✕' }[finalSt];
  const finalLabel = { ok:'전체 호환 가능', warn:'조건부 호환', err:'호환 불가' }[finalSt];

  const pairNameKo = { 'CASE × PCB':'케이스와 PCB', 'CASE × PLATE':'케이스와 보강판', 'PCB × PLATE':'PCB와 보강판' };

  let reasonText = '';
  if (finalSt === 'err') {
    const errPairLabels = [...new Set(pairs.filter(p => ovSt(p.checks) === 'err').map(p => p.label))];
    const koList = errPairLabels.map(l => pairNameKo[l] || l);
    reasonText = ` — ${koList.join(', ')}가 호환되지 않습니다.`;
  } else if (finalSt === 'warn') {
    const warnPairLabels = [...new Set(pairs.filter(p => ovSt(p.checks) === 'warn').map(p => p.label))];
    const koList = warnPairLabels.map(l => pairNameKo[l] || l);
    reasonText = ` — ${koList.join(', ')} 호환에 주의가 필요합니다.`;
  } else {
    reasonText = ' — 모든 조합이 문제없이 호환됩니다.';
  }

  const verdictHtml = `<div class="final-verdict ${finalSt}">
    <div class="final-verdict-icon">${finalIcon}</div>
    <div class="final-verdict-text"><b>${finalLabel}</b>${reasonText}</div>
  </div>`;

  const resultEl = document.getElementById('compat-result');
  resultEl.innerHTML = verdictHtml + '<div class="compat-section">' +
    pairs.map(pair => {
      const st = ovSt(pair.checks);
      return `<div class="compat-pair">
        <div class="compat-pair-title">${pair.label}<span class="overall-badge ${st}">${icons[st]} ${stLabel[st]}</span></div>
        ${pair.checks.map(c=>`<div class="check-row"><div class="check-icon ${c.status}">${icons[c.status]}</div><div class="check-field">${c.field}</div><div class="check-msg">${c.msg}</div></div>`).join('')}
      </div>`;
    }).join('') + '</div>';
}

function renderResult() {
  // sel rows
  [['case','CASE'],['plate','PLATE'],['pcb','PCB']].forEach(([cat, label]) => {
    const row = document.getElementById('selrow-' + cat);
    const info = row.querySelector('.sel-row-info');
    const existingBtn = row.querySelector('.sel-clear-btn');
    if (existingBtn) existingBtn.remove();
    if (sel[cat]) {
      const p = sel[cat];
      info.innerHTML = `<div class="sel-row-name">${p.name}</div>${p.option?`<div class="sel-row-opt">${p.option}</div>`:''}`;
      const btn = document.createElement('button');
      btn.className = 'sel-clear-btn';
      btn.textContent = '×';
      const catKey = cat;
      btn.onclick = (e) => { e.stopPropagation(); sel[catKey]=null; updateCatLabels(); renderGrid(); renderResult(); };
      row.appendChild(btn);
    } else {
      info.innerHTML = '<div class="sel-row-empty">선택 안됨</div>';
    }
  });

  updateCompatBtn();

  const selCount = Object.values(sel).filter(Boolean).length;
  const resultEl = document.getElementById('compat-result');
  if (selCount < 2) {
    resultEl.innerHTML = `<div class="compat-pending">부품을 2개 이상 선택하고<br>호환성 체크 버튼을 눌러주세요.</div>`;
  } else {
    // 선택이 바뀌었으면 이전 결과 초기화 (버튼 다시 누르도록)
    const hasResult = resultEl.querySelector('.compat-section');
    if (!hasResult) {
      resultEl.innerHTML = `<div class="compat-pending">부품을 2개 이상 선택하고<br>호환성 체크 버튼을 눌러주세요.</div>`;
    } else {
      // 결과가 있으면 선택 변경 안내
      resultEl.innerHTML = `<div class="compat-pending">선택이 변경되었습니다.<br>호환성 체크 버튼을 다시 눌러주세요.</div>`;
    }
  }

}

// ── IMAGE PREVIEW ──
function showPreview(e, url, name, el) {
  const popup = document.getElementById('img-preview-popup');
  document.getElementById('preview-name').textContent = name;
  document.getElementById('preview-img').src = url;
  popup.style.display = 'block';
  positionPreview(el);
}
function positionPreview(el) {
  const popup = document.getElementById('img-preview-popup');
  if (!el || popup.style.display === 'none') return;
  const rect = el.getBoundingClientRect();
  const pw = 260, ph = 290;
  let left = rect.right + 8;
  let top = rect.top + (rect.height / 2) - (ph / 2);
  // 뷰포트 밖으로 나가면 왼쪽에 표시
  if (left + pw > window.innerWidth - 8) left = rect.left - pw - 8;
  // 상하 범위 조정
  if (top < 8) top = 8;
  if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}
function hidePreview() {
  document.getElementById('img-preview-popup').style.display = 'none';
}

// ── STICKY TOP ──
function updateStickyTops() {
  const sh = document.querySelector('.site-header');
  if (sh) document.documentElement.style.setProperty('--h-site', sh.offsetHeight + 'px');
}

// ── MOBILE DROPDOWN ──
function toggleCatDropdown(e) {
  if (window.innerWidth > 900) return;
  e.stopPropagation();
  const dd = document.getElementById('cat-dropdown');
  dd.classList.toggle('open');
  ['case','plate','pcb'].forEach(c => {
    const el = document.getElementById('dd-' + c);
    if (el) el.classList.toggle('active', c === openPanel);
  });
}
function closeCatDropdown() {
  const dd = document.getElementById('cat-dropdown');
  if (dd) dd.classList.remove('open');
}
document.addEventListener('click', closeCatDropdown);

// ── INIT ──
setPanel('case');
renderResult();
requestAnimationFrame(updateStickyTops);
window.addEventListener('resize', updateStickyTops);

</script>
