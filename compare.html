<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호환성 체크 — GEONWORKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f8f8;
    --bg3: #f2f2f2;
    --border: #e8e8e8;
    --border2: #d4d4d4;
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --ok: #2d7a4f;
    --ok-bg: #f0faf4;
    --warn: #c47a00;
    --warn-bg: #fffbf0;
    --err: #c0392b;
    --err-bg: #fdf2f0;
    --sel: #111111;
    --sel-text: #ffffff;
    --r: 2px;
    --font: 'Noto Sans KR', 'Pretendard', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
  }
  .logo svg { flex-shrink: 0; }
  .logo-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
  }
  .header-nav {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: .05em;
  }

  /* ── PAGE TITLE ── */
  .page-title-wrap {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
  }
  .page-label {
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .page-title {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -.01em;
  }
  .page-desc {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    min-height: calc(100vh - 160px);
    align-items: start;
  }

  /* ── LEFT: CATEGORY PANEL ── */
  .cat-panel {
    border-right: 1px solid var(--border);
    position: sticky;
    top: 60px;
    max-height: calc(100vh - 60px);
    overflow-y: auto;
  }

  .cat-section {
    border-bottom: 1px solid var(--border);
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
    gap: 12px;
  }
  .cat-header:hover { background: var(--bg2); }
  .cat-header.active { background: var(--bg2); }

  .cat-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
  }

  .cat-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--text3);
    flex-shrink: 0;
  }

  .cat-info { min-width: 0; flex: 1; }

  .cat-label {
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .cat-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-top: 1px;
  }

  .cat-sel-text {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .cat-sel-text.empty { color: var(--text3); }

  .cat-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    color: transparent;
    transition: all .15s;
  }
  .cat-check.done {
    background: var(--sel);
    border-color: var(--sel);
    color: white;
  }

  .cat-arrow {
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    transition: transform .15s;
  }
  .cat-header.active .cat-arrow { transform: rotate(180deg); }

  /* ── MIDDLE: PRODUCT GRID ── */
  .grid-panel {
    border-right: 1px solid var(--border);
    min-height: calc(100vh - 160px);
  }

  .grid-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 60px;
    background: var(--bg);
    z-index: 10;
  }
  .grid-header-right { margin-left: auto; }

  .grid-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .grid-count {
    font-size: 11px;
    color: var(--text3);
  }
  .btn-reset-header {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 5px 12px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    transition: all .12s;
    white-space: nowrap;
  }
  .btn-reset-header:hover { border-color: var(--text); color: var(--text); }

  /* search */
  .search-wrap {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 101px;
    background: var(--bg);
    z-index: 9;
  }
  .search-input {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .12s;
  }
  .search-input:focus { border-color: var(--text); }
  .search-input::placeholder { color: var(--text3); }

  /* filter */
  .filter-wrap {
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 148px;
    background: var(--bg);
    z-index: 8;
  }
  .filter-row {
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-top: 1px solid var(--border);
    min-height: 36px;
    gap: 0;
    width: 100%;
    min-width: 0;
  }
  .filter-row:first-child { border-top: none; }
  .filter-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text2);
    text-transform: uppercase;
    flex-shrink: 0;
    width: 72px;
    padding: 8px 0;
  }
  .filter-chips {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1 1 0;
    overflow: hidden;
    flex-wrap: nowrap;
    padding: 6px 0;
    min-width: 0;
    width: 0;
  }
  .filter-chips.expanded {
    flex-wrap: wrap;
    overflow: visible;
    width: auto;
  }
  .filter-row:has(.filter-chips.expanded) {
    overflow: visible;
  }
  .fchip {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 2px 9px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    transition: all .12s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .fchip:hover { border-color: var(--text); color: var(--text); }
  .fchip.on { background: var(--text); border-color: var(--text); color: white; }
  .fchip-more {
    background: none;
    border: none;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    white-space: nowrap;
    flex-shrink: 0;
    padding: 2px 8px 2px 10px;
    transition: color .12s;
    margin-left: 2px;
    border-left: 1px solid var(--border);
  }
  .fchip-more:hover { color: var(--text); }

  /* product cards */
  .products-wrap {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pcard {
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pcard:hover { border-color: var(--border2); background: var(--bg2); }
  .pcard.selected {
    border-color: var(--sel);
    background: var(--sel);
    color: white;
  }

  .pcard-img-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .pcard-img {
    width: 80px;
    height: 80px;
    border-radius: 3px;
    object-fit: cover;
    display: block;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .pcard.selected .pcard-img { border-color: rgba(255,255,255,.2); }
  .pcard-img-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 3px;
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--border2);
  }
  .pcard-img-preview {
    display: none;
    position: absolute;
    left: 88px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
    border: 1px solid var(--border);
    background: white;
    pointer-events: none;
    width: 260px;
  }
  .pcard-img-preview-name {
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--font);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pcard-img-preview img {
    display: block;
    width: 260px;
    height: 260px;
    object-fit: cover;
  }
  .pcard-img-wrap:hover .pcard-img-preview { display: block; }

  .pcard-main { flex: 1; min-width: 0; }
  .pcard-size {
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 2px;
  }
  .pcard.selected .pcard-size { color: rgba(255,255,255,.5); }
  .pcard-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pcard-opt {
    font-size: 11px;
    color: var(--text2);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pcard.selected .pcard-opt { color: rgba(255,255,255,.65); }

  .pcard-right {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .pcard-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: transparent;
    transition: all .15s;
    flex-shrink: 0;
  }
  .pcard:hover .pcard-check { border-color: var(--text2); }
  .pcard.selected .pcard-check {
    background: white;
    border-color: white;
    color: var(--sel);
  }
  .pcard-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    color: var(--text3);
    text-decoration: none;
    transition: color .12s;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .pcard-link:hover { color: var(--text); }
  .pcard.selected .pcard-link { color: rgba(255,255,255,.5); }
  .pcard.selected .pcard-link:hover { color: white; }
  .pcard-link:hover { color: var(--text); }
  .pcard.selected .pcard-link { color: rgba(255,255,255,.5); }
  .pcard.selected .pcard-link:hover { color: white; }

  /* empty state */
  .grid-empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    line-height: 2;
  }

  /* ── RIGHT: RESULT PANEL ── */
  .result-panel {
    position: sticky;
    top: 60px;
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    padding: 20px;
  }

  .result-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* selected summary */
  .sel-summary {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .sel-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    min-height: 52px;
  }
  .sel-row:last-child { border-bottom: none; }
  .sel-row-cat {
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    width: 42px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .sel-row-info { flex: 1; min-width: 0; }
  .sel-row-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sel-row-opt {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sel-row-empty {
    font-size: 12px;
    color: var(--text3);
    font-style: italic;
  }
  .sel-clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color .12s;
    flex-shrink: 0;
  }
  .sel-clear-btn:hover { color: var(--text); }

  /* compat results */
  .compat-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .compat-pending {
    padding: 24px 16px;
    text-align: center;
    background: var(--bg2);
    border-radius: var(--r);
    font-size: 12px;
    color: var(--text3);
    line-height: 1.8;
  }

  .compat-pair {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .compat-pair-title {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .overall-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: none;
  }
  .overall-badge.ok { background: var(--ok-bg); color: var(--ok); }
  .overall-badge.warn { background: var(--warn-bg); color: var(--warn); }
  .overall-badge.err { background: var(--err-bg); color: var(--err); }

  .check-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .check-row:last-child { border-bottom: none; }
  .check-icon {
    font-size: 10px;
    font-weight: 700;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .check-icon.ok { background: var(--ok-bg); color: var(--ok); }
  .check-icon.warn { background: var(--warn-bg); color: var(--warn); }
  .check-icon.err { background: var(--err-bg); color: var(--err); }
  .check-field {
    font-size: 10px;
    color: var(--text3);
    width: 72px;
    flex-shrink: 0;
    padding-top: 2px;
    font-weight: 500;
  }
  .check-msg { flex: 1; color: var(--text2); line-height: 1.5; }

  /* clear all */
  .btn-clear-all {
    width: 100%;
    margin-top: 16px;
    padding: 9px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    transition: all .12s;
  }
  .btn-clear-all:hover { border-color: var(--text); color: var(--text); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text3);
  }
  .footer-logo { font-weight: 700; letter-spacing: .12em; }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    .site-header { padding: 0 20px; }
    .header-nav { display: none; }
    .page-title-wrap { padding: 24px 20px 20px; }
    .page-title { font-size: 22px; }

    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
    }

    .cat-panel {
      position: static;
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    .grid-panel {
      border-right: none;
      min-height: 0;
    }

    .grid-header {
      top: 60px;
    }

    .filter-wrap {
      top: 101px;
    }

    .result-panel {
      position: static;
      max-height: none;
      border-top: 1px solid var(--border);
    }

    footer { padding: 20px; flex-direction: column; gap: 8px; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <a href="https://geonworks.cafe24.com/skin-skin3" class="logo">
    <svg width="20" height="20" viewBox="0 0 596 842" fill="#111" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd">
      <g transform="translate(-9.3635,-817.6605)">
        <path d="M485.655,1233.52L412.764,1306.41L485.655,1306.41L485.655,1233.52Z"/>
        <path d="M485.655,1091.31L270.556,1306.41L350.053,1385.9L350,1306.41L485.655,1170.75L485.655,1091.31Z"/>
        <path d="M485.655,1379.3L412.764,1306.41L412.764,1385.96L350.053,1448.67L207.791,1306.41L485.655,1028.54L485.655,949.101L128.348,1306.41L350.053,1528.11L485.655,1379.3Z"/>
      </g>
    </svg>
    <span class="logo-text">GEONWORKS</span>
  </a>
  <div class="header-nav">SERVICE · 호환성 체크</div>
</header>

<!-- PAGE TITLE -->
<div class="page-title-wrap">
  <div class="page-label">SERVICE</div>
  <h1 class="page-title">호환성 체크</h1>
  <p class="page-desc">하우징 · 보강판 · PCB를 선택하세요. 세 가지를 모두 선택하면 호환성 분석이 시작됩니다.</p>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: CATEGORY PANEL -->
  <div class="cat-panel">
    <div class="cat-section" id="cat-section-case">
      <div class="cat-header" id="cat-hdr-case" onclick="setPanel('case')">
        <div class="cat-header-left">
          <div class="cat-num">01</div>
          <div class="cat-info">
            <div class="cat-label">CASE</div>
            <div class="cat-name">하우징</div>
            <div class="cat-sel-text empty" id="cat-sel-case">선택 안됨</div>
          </div>
        </div>
        <div class="cat-check" id="cat-check-case"></div>
        <div class="cat-arrow">▾</div>
      </div>
    </div>

    <div class="cat-section" id="cat-section-plate">
      <div class="cat-header" id="cat-hdr-plate" onclick="setPanel('plate')">
        <div class="cat-header-left">
          <div class="cat-num">02</div>
          <div class="cat-info">
            <div class="cat-label">PLATE</div>
            <div class="cat-name">보강판</div>
            <div class="cat-sel-text empty" id="cat-sel-plate">선택 안됨</div>
          </div>
        </div>
        <div class="cat-check" id="cat-check-plate"></div>
        <div class="cat-arrow">▾</div>
      </div>
    </div>

    <div class="cat-section" id="cat-section-pcb">

const inter=(a,b)=>a.filter(x=>b.includes(x));
const hasAny=(a,b)=>a.some(x=>b.includes(x));

function checkCasePCB(c,p){
  const r=[];
  c.size!==p.size?r.push(chk('err','Size',`케이스 <b>${c.size}</b> ↔ PCB <b>${p.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${c.size}</b> 일치`));

  }
  const grpOk=c.pcbGroup.length>0&&p.pcbGroup.length>0&&hasAny(c.pcbGroup,p.pcbGroup);
  const compatOk=c.compatiblePCB.includes(p.skuBase)||p.compatibleCase.includes(c.id);
  if(grpOk)r.push(chk('ok','PCB Group',`<b>${inter(c.pcbGroup,p.pcbGroup).join(', ')}</b> 규격 일치`));
  else if(compatOk)r.push(chk('ok','Compatible PCB',`호환 목록에 포함`));
  else r.push(chk('err','Compatible PCB',`호환 PCB 목록에 없음`));
  const brOk=inter(c.bottomRow,p.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(c.bottomRow.includes('WKL')&&p.bottomRow.includes('WK')&&p.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL 케이스 + WK PCB — <b>7U</b> 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 지원 Bottom Row 없음`));
  r.push(chk('ok','Spacebar',`PCB 지원: <b>${p.spacebar.join(', ')}</b>`));
  const reqDB=c.dbBoards;
  if(c.dbDirect&&reqDB.length===0){
    p.usbConnector?r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능`)):r.push(chk('err','Connection',`케이스 USB 직결 전용 — PCB USB 커넥터 없음`));
  }else if(!c.dbDirect&&reqDB.length>0){
    const oc=p.otherConnector||'';
    const avail=oc.includes('(included)')?'in':oc.includes('(solderable)')?'sol':'none';
    const dbName=oc.replace(/\s*\(.*\)/,'');
    if(avail==='none')r.push(chk('err','Connection',`도터보드 연결 불가 — PCB 커넥터 없음`));
    else if(avail==='sol')r.push(chk('warn','Connection',`<b>${dbName}</b> 커넥터 납땜 필요, <b>${reqDB.join(', ')}</b> 별도 구매 필요`));
    else{
      const inc=p.daughterboard!=='Not Included'&&reqDB.some(d=>p.daughterboard.toLowerCase().includes(d.toLowerCase().split(' ')[0]));
      inc?r.push(chk('ok','Connection',`<b>${p.daughterboard}</b> 동봉`)):r.push(chk('warn','Connection',`<b>${reqDB.join(', ')}</b> 별도 구매 필요`));
    }
  }else if(c.dbDirect&&reqDB.length>0){
    if(p.usbConnector){
      const oc=p.otherConnector||'';
      const avail=oc.includes('(included)')?'in':oc.includes('(solderable)')?'sol':'none';
      const dbName=oc.replace(/\s*\(.*\)/,'');
      if(avail==='in')r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능 (<b>${reqDB.join(', ')}</b> 연결도 가능)`));
      else if(avail==='sol')r.push(chk('warn','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능 (<b>${reqDB.join(', ')}</b> 연결 시 <b>${dbName}</b> 납땜 필요)`));
      else r.push(chk('ok','Connection',`<b>${p.usbConnector}</b> 직접 연결 가능`));
    }else{
      const oc=p.otherConnector||'';
      oc.includes('(included)')||oc.includes('(solderable)')?r.push(chk('warn','Connection',`USB 직결 불가 — <b>${reqDB.join(', ')}</b> 별도 구매 필요`)):r.push(chk('err','Connection',`연결 방법 없음`));
    }
  }else{r.push(chk('err','Connection',`연결 방식 정보 없음`));}
  return r;
}

function checkCasePlate(c,pl){
  const r=[];
  c.size!==pl.size?r.push(chk('err','Size',`케이스 <b>${c.size}</b> ↔ 보강판 <b>${pl.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${c.size}</b> 일치`));
  pl.compatibleCase.includes(c.id)||pl.compatibleCase.includes(c.name)?r.push(chk('ok','Compatible Case',`<b>${c.name}</b> 호환 목록 포함`)):r.push(chk('err','Compatible Case',`<b>${c.name}</b> 호환 목록에 없음`));
  if(!c.fLayerNone&&!pl.fLayerNone)
    c.fLayer.some(f=>pl.fLayer.includes(f))?r.push(chk('ok','F Layer',`케이스 <b>${c.fLayer[0]}</b> 지원`)):r.push(chk('err','F Layer',`케이스 <b>${c.fLayer[0]}</b> — 보강판 미지원`));
  const brOk=inter(c.bottomRow,pl.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(c.bottomRow.includes('WKL')&&pl.bottomRow.includes('WK')&&pl.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL 케이스 + WK 보강판 — 7U 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 Bottom Row 없음`));
  if(pl.plateType==='Plateless')
    c.platelessSupport==='Yes'?r.push(chk('ok','Plateless',`케이스 Plateless 지원`)):r.push(chk('err','Plateless',`케이스 Plateless 미지원`));
  return r;
}

function checkPCBPlate(p,pl){
  const r=[];
  p.size!==pl.size?r.push(chk('err','Size',`PCB <b>${p.size}</b> ↔ 보강판 <b>${pl.size}</b> 불일치`)):r.push(chk('ok','Size',`<b>${p.size}</b> 일치`));
  if(!p.fLayerNone&&!pl.fLayerNone){
    const c=inter(p.fLayer,pl.fLayer);
    c.length>0?r.push(chk('ok','F Layer',`공통: <b>${c.join(', ')}</b>`)):r.push(chk('err','F Layer',`공통 F Layer 없음`));
  }
  const brOk=inter(p.bottomRow,pl.bottomRow);
  if(brOk.length>0)r.push(chk('ok','Bottom Row',`공통 지원: <b>${brOk.join(', ')}</b>`));
  else if(p.bottomRow.includes('WKL')&&pl.bottomRow.includes('WK')&&pl.spacebar.includes('7U'))r.push(chk('warn','Bottom Row',`WKL PCB + WK 보강판 — 7U 사용 시 제한적 호환`));
  else r.push(chk('err','Bottom Row',`공통 Bottom Row 없음`));
  const sbOk=inter(p.spacebar,pl.spacebar);
  sbOk.length>0?r.push(chk('ok','Spacebar',`공통 지원: <b>${sbOk.join(', ')}</b>`)):r.push(chk('err','Spacebar',`공통 Spacebar 없음`));
  if(p.type==='Hall Effect')
    pl.heCompatible==='Yes'?r.push(chk('ok','HE Compatible',`Hall Effect PCB 호환 보강판`)):r.push(chk('err','HE Compatible',`HE PCB 전용 보강판 아님`));
  if(pl.plateType==='Plateless'){
    if(p.platelessSupport==='Yes')r.push(chk('ok','Plateless',`PCB Plateless 지원`));
    else if(p.platelessSupport==='Not Recommended')r.push(chk('warn','Plateless',`Plateless 권장 안함 — 두께 <b>${p.thickness}</b>`));
    else r.push(chk('err','Plateless',`Plateless 불가 — 두께 <b>${p.thickness}</b>`));
  }
  return r;
}

function ovSt(checks){
  if(!checks||!checks.length)return'none';
  if(checks.some(c=>c.status==='err'))return'err';
  if(checks.some(c=>c.status==='warn'))return'warn';
  return'ok';
}

function getChecks(cat,part){
  const r=[];
  if(cat==='case'){if(sel.pcb)r.push(...checkCasePCB(part,sel.pcb));if(sel.plate)r.push(...checkCasePlate(part,sel.plate));}
  else if(cat==='pcb'){if(sel.case)r.push(...checkCasePCB(sel.case,part));if(sel.plate)r.push(...checkPCBPlate(part,sel.plate));}
  else{if(sel.case)r.push(...checkCasePlate(sel.case,part));if(sel.pcb)r.push(...checkPCBPlate(sel.pcb,part));}
  return r;
}

// ── UI STATE ──
let sel = { case: null, plate: null, pcb: null };
const ORDER = ['case', 'plate', 'pcb'];
let openPanel = 'case';
let fSize = 'all';
let fSub = 'all';   // mounting / material / type
let fRgb = 'all';   // pcb only
let fSb = 'all';    // pcb spacebar
let searchQ = '';

function getData(cat) {
  return cat === 'case' ? CASES : cat === 'pcb' ? PCBS : PLATES;
}

function getSizes(cat) {
  return ['all', ...[...new Set(getData(cat).map(p => p.size))].sort()];
}

// sub-filter options per category
function getSubOpts(cat) {
  if (cat === 'case') {
    const vals = [...new Set(CASES.flatMap(p => p.mountingStyle.split(',').map(s => s.trim())))].filter(Boolean).sort();
    return { label: 'MOUNT', vals };
  }
  if (cat === 'plate') {
    const vals = [...new Set(PLATES.map(p => p.material))].filter(Boolean).sort();
    return { label: 'MATERIAL', vals };
  }
  if (cat === 'pcb') {
    const vals = [...new Set(PCBS.map(p => p.type))].filter(Boolean).sort();
    return { label: 'TYPE', vals };
  }
  return null;
}

// ── PANEL ──
function setPanel(cat) {
  openPanel = cat;
  fSize = 'all';
  fSub = 'all';
  fRgb = 'all';
  fSb = 'all';
  searchQ = '';
  window._fexp_sub = false;
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';

  // update category headers active state
  ['case', 'plate', 'pcb'].forEach(c => {
    const hdr = document.getElementById('cat-hdr-' + c);
    hdr.classList.toggle('active', c === cat);
  });

  renderGrid();
}

// ── SELECT / DESELECT ──
function selectPart(cat, id) {
  const data = getData(cat);
  const part = data.find(p => p.id === id);
  sel[cat] = (sel[cat] && sel[cat].id === id) ? null : part;
  updateCatLabels();
  renderGrid();
  renderResult();
}

function clearAll() {
  sel = { case: null, plate: null, pcb: null };
  searchQ = '';
  fSb = 'all';
  document.getElementById('search-input').value = '';
  updateCatLabels();
  renderResult();
  setPanel('case');
}

// ── CAT LABELS ──
function updateCatLabels() {
  ['case', 'plate', 'pcb'].forEach(cat => {
    const selEl = document.getElementById('cat-sel-' + cat);
    const checkEl = document.getElementById('cat-check-' + cat);
    if (sel[cat]) {
      const label = sel[cat].name + (sel[cat].option ? ' / ' + sel[cat].option : '');
      selEl.textContent = label;
      selEl.classList.remove('empty');
      checkEl.classList.add('done');
      checkEl.textContent = '✓';
    } else {
      selEl.textContent = '선택 안됨';
      selEl.classList.add('empty');
      checkEl.classList.remove('done');
      checkEl.textContent = '';
    }
  });
}

function toggleSize(v) { fSize = fSize === v ? 'all' : v; renderGrid(); }
function toggleSub(v)  { fSub  = fSub  === v ? 'all' : v; renderGrid(); }
function toggleRgb(v)  { fRgb  = fRgb  === v ? 'all' : v; renderGrid(); }
function toggleSb(v)   { fSb   = fSb   === v ? 'all' : v; renderGrid(); }

// ── GRID ──
function renderGrid() {
  const cat = openPanel;
  let parts = getData(cat);
  const sizes = getSizes(cat);
  const subOpts = getSubOpts(cat);

  // header title
  const titles = { case: '하우징', plate: '보강판', pcb: 'PCB' };
  document.getElementById('grid-title').textContent = titles[cat] + ' 선택';

  // filter bar
  const fw = document.getElementById('filter-wrap');

  let filtersHTML = '';

  // SIZE
  if (sizes.length > 2) {
    filtersHTML += `<div class="filter-row"><span class="filter-label">SIZE</span><div class="filter-chips">` +
      `<button class="fchip${fSize==='all'?' on':''}" onclick="fSize='all';renderGrid()">전체</button>` +
      sizes.filter(s=>s!=='all').map(sz=>`<button class="fchip${fSize===sz?' on':''}" onclick="toggleSize('${sz}')">${sz}</button>`).join('') +
      `</div></div>`;
  }

  // sub filter
  if (subOpts && subOpts.vals.length > 1) {
    const label = subOpts.label;
    const vals = subOpts.vals;
    const expanded = !!window['_fexp_sub'];
    filtersHTML += `<div class="filter-row"><span class="filter-label">${label}</span><div class="filter-chips${expanded?' expanded':''}" id="fchips-sub">` +
      `<button class="fchip${fSub==='all'?' on':''}" onclick="fSub='all';renderGrid()">전체</button>` +
      vals.map(v => { const e=v.replace(/'/g,"\\'"); return `<button class="fchip${fSub===v?' on':''}" onclick="toggleSub('${e}')">${v}</button>`; }).join('') +
      `</div><button class="fchip-more" id="fchip-more-sub" style="display:none" onclick="window._fexp_sub=!window._fexp_sub;renderGrid()"></button></div>`;
  }

  // PCB: RGB
  if (cat === 'pcb') {
    const rgbVals = [...new Set(PCBS.map(p => p.rgb))].filter(Boolean).sort();
    if (rgbVals.length > 1) {
      filtersHTML += `<div class="filter-row"><span class="filter-label">RGB</span><div class="filter-chips">` +
        `<button class="fchip${fRgb==='all'?' on':''}" onclick="fRgb='all';renderGrid()">전체</button>` +
        rgbVals.map(v=>{const e=v.replace(/'/g,"\\'");return `<button class="fchip${fRgb===v?' on':''}" onclick="toggleRgb('${e}')">${v}</button>`;}).join('') +
        `</div></div>`;
    }
    const sbVals = [...new Set(PCBS.flatMap(p => p.spacebar))].filter(Boolean).sort();
    if (sbVals.length > 1) {
      filtersHTML += `<div class="filter-row"><span class="filter-label">SPACEBAR</span><div class="filter-chips">` +
        `<button class="fchip${fSb==='all'?' on':''}" onclick="fSb='all';renderGrid()">전체</button>` +
        sbVals.map(v=>{const e=v.replace(/'/g,"\\'");return `<button class="fchip${fSb===v?' on':''}" onclick="toggleSb('${e}')">${v}</button>`;}).join('') +
        `</div></div>`;
    }
  }

  fw.innerHTML = filtersHTML;
  fw.style.display = filtersHTML ? '' : 'none';

  // overflow 감지 — 렌더 후 실제 너비 비교
  const chipsEl = document.getElementById('fchips-sub');
  const moreEl = document.getElementById('fchip-more-sub');
  if (chipsEl && moreEl) {
    const expanded = chipsEl.classList.contains('expanded');
    if (expanded) {
      moreEl.textContent = '∧ 접기';
      moreEl.style.display = '';
    } else {
      // 한 프레임 후 체크 (layout 확정 후)
      requestAnimationFrame(() => {
        const overflowing = chipsEl.scrollWidth > chipsEl.clientWidth + 2;
        moreEl.style.display = overflowing ? '' : 'none';
        moreEl.textContent = '펼치기 ∨';
      });
    }
  }

  // apply filters
  if (fSize !== 'all') parts = parts.filter(p => p.size === fSize);
  if (fSub !== 'all') {
    if (cat === 'case') parts = parts.filter(p => p.mountingStyle.includes(fSub));
    else if (cat === 'plate') parts = parts.filter(p => p.material === fSub);
    else if (cat === 'pcb') parts = parts.filter(p => p.type === fSub);
  }
  if (cat === 'pcb' && fRgb !== 'all') parts = parts.filter(p => p.rgb === fRgb);
  if (cat === 'pcb' && fSb !== 'all') parts = parts.filter(p => p.spacebar.includes(fSb));

  // apply search
  if (searchQ.trim()) {
    const q = searchQ.trim().toLowerCase();
    parts = parts.filter(p => {
      const name = (p.name + ' ' + (p.option || '')).toLowerCase();
      return name.includes(q);
    });
  }

  document.getElementById('grid-count').textContent = parts.length + '개';

  // cards
  const wrap = document.getElementById('products-wrap');
  if (parts.length === 0) {
    wrap.innerHTML = '<div class="grid-empty">검색 결과가 없습니다.</div>';
    return;
  }

  wrap.innerHTML = parts.map(p => {
    const isSel = sel[cat] && sel[cat].id === p.id;
    const displayName = cat === 'plate' ? (p.name + ' ' + p.option) : p.name;
    const displayOpt = cat === 'plate' ? '' : (p.option || '');

    const imgHTML = p.imageUrl
      ? `<div class="pcard-img-wrap">
           <img class="pcard-img" src="${p.imageUrl}" alt="${p.name}" loading="lazy" onerror="this.parentElement.className='pcard-img-placeholder';this.parentElement.innerHTML='⌨'">
           <div class="pcard-img-preview">
             <div class="pcard-img-preview-name">${displayName}</div>
             <img src="${p.imageUrl}" alt="${p.name}">
           </div>
         </div>`
      : `<div class="pcard-img-placeholder">⌨</div>`;

    const linkHTML = p.productUrl
      ? `<a class="pcard-link" href="${p.productUrl}" target="_blank" title="제품 페이지" onclick="event.stopPropagation()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`
      : '';

    return `<div class="pcard${isSel ? ' selected' : ''}" onclick="selectPart('${cat}','${p.id}')">
      ${imgHTML}
      <div class="pcard-main">
        <div class="pcard-size">${p.size}</div>
        <div class="pcard-name">${displayName}</div>
        ${displayOpt ? `<div class="pcard-opt">${displayOpt}</div>` : ''}
      </div>
      <div class="pcard-right">
        <div class="pcard-check">${isSel ? '✓' : ''}</div>
        ${linkHTML}
      </div>
    </div>`;
  }).join('');
}

// ── RESULT ──
function renderResult() {
  // update sel summary rows
  [['case','CASE'],['plate','PLATE'],['pcb','PCB']].forEach(([cat, label]) => {
    const row = document.getElementById('selrow-' + cat);
    const info = row.querySelector('.sel-row-info');
    // always remove existing clear btn first to rebuild cleanly
    const existingBtn = row.querySelector('.sel-clear-btn');
    if (existingBtn) existingBtn.remove();

    if (sel[cat]) {
      const p = sel[cat];
      const displayOpt = p.option || '';
      info.innerHTML = `<div class="sel-row-name">${p.name}</div>${displayOpt ? `<div class="sel-row-opt">${displayOpt}</div>` : ''}`;
      const btn = document.createElement('button');
      btn.className = 'sel-clear-btn';
      btn.textContent = '×';
      const catKey = cat; // explicit capture
      btn.onclick = (e) => { e.stopPropagation(); sel[catKey] = null; updateCatLabels(); renderGrid(); renderResult(); };
      row.appendChild(btn);
    } else {
      info.innerHTML = '<div class="sel-row-empty">선택 안됨</div>';
    }
  });

  // compat — only when all 3 selected
  const resultEl = document.getElementById('compat-result');
  if (!sel.case || !sel.plate || !sel.pcb) {
    const missing = ['case','plate','pcb'].filter(c => !sel[c]).length;
    resultEl.innerHTML = `<div class="compat-pending">세 가지 부품을 모두 선택하면<br>호환성 분석이 표시됩니다.<br><br><span style="font-size:11px;color:#bbb">${3 - missing}개 선택됨 · ${missing}개 남음</span></div>`;
    return;
  }

  const icons = { ok: '✓', warn: '!', err: '✕' };
  const stLabel = { ok: '호환 가능', warn: '조건부 호환', err: '호환 불가' };

  const pairs = [
    { label: 'CASE × PCB', checks: checkCasePCB(sel.case, sel.pcb) },
    { label: 'CASE × PLATE', checks: checkCasePlate(sel.case, sel.plate) },
    { label: 'PCB × PLATE', checks: checkPCBPlate(sel.pcb, sel.plate) },
  ];

  resultEl.innerHTML = '<div class="compat-section">' +
    pairs.map(pair => {
      const st = ovSt(pair.checks);
      return `<div class="compat-pair">
        <div class="compat-pair-title">
          ${pair.label}
          <span class="overall-badge ${st}">${icons[st]} ${stLabel[st]}</span>
        </div>
        ${pair.checks.map(c => `<div class="check-row">
          <div class="check-icon ${c.status}">${icons[c.status]}</div>
          <div class="check-field">${c.field}</div>
          <div class="check-msg">${c.msg}</div>
        </div>`).join('')}
      </div>`;
    }).join('') +
    '</div>';
}

// ── INIT ──
setPanel('case');
renderResult();
</script>
</body>
