<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>신규 추가 요청 · GEONWORKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #ffffff;
    --bg2:     #f8f8f8;
    --bg3:     #f2f2f2;
    --border:  #e8e8e8;
    --border2: #d4d4d4;
    --text:    #111111;
    --text2:   #555555;
    --text3:   #999999;
    --accent:  #111111;
    --err:     #c0392b;
    --ok:      #2d7a4f;
    --r: 2px;
    --font: 'Noto Sans KR', 'Pretendard', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  /* LOCK */
  #lock-screen { display:flex; position:fixed; inset:0; background:#fff; z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px; }
  .lock-logo { font-size:18px; font-weight:700; letter-spacing:.12em; color:var(--text); }
  .lock-logo span { color:var(--text3); }
  .lock-desc { font-size:13px; color:var(--text2); text-align:center; line-height:1.6; }
  #lock-error { font-size:12px; color:var(--err); min-height:18px; text-align:center; }

  /* HEADER */
  header { border-bottom:1px solid var(--border); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:13px; font-weight:700; letter-spacing:.12em; color:var(--text); }
  .logo span { color:var(--text3); }
  .user-info { font-size:11px; color:var(--text3); }

  /* LAYOUT */
  .wrap { display:grid; grid-template-columns:1fr 340px; gap:0; min-height:calc(100vh - 56px); }

  /* FORM SIDE */
  .form-side { padding:32px; border-right:1px solid var(--border); }
  .page-label { font-size:11px; letter-spacing:.15em; color:var(--text3); text-transform:uppercase; margin-bottom:8px; }
  .page-title { font-size:20px; font-weight:300; margin-bottom:6px; }
  .page-desc  { font-size:13px; color:var(--text2); margin-bottom:28px; line-height:1.7; }

  .field { margin-bottom:14px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  label { display:block; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); margin-bottom:5px; }
  .required { color:var(--err); margin-left:2px; }

  input[type=text], select, textarea {
    width:100%; background:var(--bg2); border:1px solid var(--border2);
    border-radius:var(--r); padding:9px 11px; color:var(--text);
    font-family:var(--font); font-size:13px; outline:none; transition:border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); background:var(--bg); }
  input::placeholder, textarea::placeholder { color:var(--text3); }
  select option { background:var(--bg); }
  textarea { resize:vertical; min-height:72px; }

  .divider { border:none; border-top:1px solid var(--border); margin:20px 0 16px; }
  .section-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }

  .btn-add {
    width:100%; margin-top:20px;
    background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r);
    color:var(--text2); font-family:var(--font); font-size:12px; font-weight:500;
    padding:10px; cursor:pointer; transition:all .15s;
  }
  .btn-add:hover { border-color:var(--accent); color:var(--accent); background:var(--bg); }

  /* LIST SIDE */
  .list-side { padding:32px 28px; display:flex; flex-direction:column; }
  .list-title {
    font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3);
    padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .list-count { background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }

  .list-empty { color:var(--text3); font-size:13px; text-align:center; padding:32px 0; }

  .list-items { flex:1; overflow-y:auto; }
  .list-item {
    border:1px solid var(--border); border-radius:var(--r);
    padding:12px 14px; margin-bottom:8px; position:relative;
    background:var(--bg);
  }
  .item-cat  { font-size:10px; text-transform:uppercase; color:var(--text3); letter-spacing:.06em; margin-bottom:3px; }
  .item-name { font-size:13px; font-weight:500; }
  .item-opt  { font-size:12px; color:var(--text2); }
  .item-del  {
    position:absolute; top:10px; right:12px;
    background:none; border:none; color:var(--text3);
    font-size:16px; cursor:pointer; line-height:1; padding:0;
    transition:color .15s;
  }
  .item-del:hover { color:var(--err); }

  /* SEND BUTTON */
  .send-wrap { margin-top:20px; }
  .btn-send {
    width:100%; background:var(--accent); border:none; border-radius:var(--r);
    color:#fff; font-family:var(--font); font-size:13px; font-weight:700;
    padding:12px; cursor:pointer; transition:background .15s;
  }
  .btn-send:hover { background:#333; }
  .btn-send:disabled { opacity:.5; cursor:default; }
  .send-note { font-size:11px; color:var(--text3); text-align:center; margin-top:8px; }

  .status { text-align:center; font-size:13px; min-height:20px; margin-top:10px; }
  .status.ok  { color:var(--ok); }
  .status.err { color:var(--err); }

  /* MOBILE */
  @media(max-width:700px) {
    .wrap { grid-template-columns:1fr; }
    .form-side { border-right:none; border-bottom:1px solid var(--border); }
    .list-side { padding:24px 20px; }
    header { padding:0 20px; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-logo">GEON<span>.</span>works</div>
  <div class="lock-desc">@geon.works 계정으로 로그인하여<br>신규 추가 요청을 제출하세요.</div>
  <div id="g-signin-btn"></div>
  <div id="lock-error"></div>
</div>

<header>
  <div class="logo">GEON<span>.</span>request</div>
  <div class="user-info" id="user-info"></div>
</header>

<div class="wrap">
  <!-- 입력 폼 -->
  <div class="form-side">
    <div class="page-label">ADMIN</div>
    <h1 class="page-title">신규 품목 추가 요청</h1>
    <p class="page-desc">입력 내용이 관리자 이메일로 전송됩니다.<br>요청 메일 확인 후 적용됩니다.</p>

    <div class="field">
      <label>카테고리 <span class="required">*</span></label>
      <select id="req-cat">
        <option value="">선택하세요</option>
        <option value="housing">housing</option>
        <option value="pcb">pcb</option>
        <option value="plate">plate</option>
        <option value="switch">switch</option>
        <option value="stabilizer">stabilizer</option>
        <option value="keycap">keycap</option>
        <option value="foam">foam</option>
        <option value="lubricant">lubricant</option>
        <option value="cable">cable</option>
        <option value="deskmat">deskmat</option>
        <option value="bag">bag</option>
        <option value="bumpon">bumpon</option>
        <option value="tool">tool</option>
        <option value="wooting">wooting</option>
        <option value="ec">ec</option>
        <option value="keyboard">keyboard</option>
        <option value="etc">etc</option>
      </select>
    </div>

    <div class="field">
      <label>품목명 <span class="required">*</span></label>
      <input type="text" id="req-name" placeholder="예: Geon Bumpon"/>
    </div>

    <div class="field-row">
      <div>
        <label>옵션</label>
        <input type="text" id="req-opt" placeholder="없으면 비워두세요 (N/A)"/>
      </div>
      <div>
        <label>브랜드</label>
        <input type="text" id="req-brand" placeholder="예: Geonworks"/>
      </div>
    </div>

    <div class="field-row">
      <div>
        <label>가격</label>
        <input type="text" id="req-price" placeholder="숫자만 (예: 35000)"/>
      </div>
      <div>
        <label>바코드</label>
        <input type="text" id="req-barcode" placeholder="없으면 비워두세요"/>
      </div>
    </div>

    <div class="field-row">
      <div>
        <label>위치코드</label>
        <input type="text" id="req-loc" placeholder="예: A-1"/>
      </div>
      <div>
        <label>보조바코드</label>
        <input type="text" id="req-barcode2" placeholder="없으면 비워두세요"/>
      </div>
    </div>

    <hr class="divider"/>
    <div class="section-label">네이버 스토어</div>

    <div class="field">
      <label>네이버 판매명</label>
      <input type="text" id="req-nname" placeholder="네이버 스토어 상품명"/>
    </div>
    <div class="field">
      <label>네이버 옵션명</label>
      <input type="text" id="req-nopt" placeholder="네이버 스토어 옵션명"/>
    </div>
    <div class="field-row">
      <div>
        <label>네이버 URL</label>
        <input type="text" id="req-nurl" placeholder="https://..."/>
      </div>
      <div>
        <label>쇼피파이 URL</label>
        <input type="text" id="req-surl" placeholder="https://..."/>
      </div>
    </div>

    <hr class="divider"/>
    <div class="field">
      <label>특이사항</label>
      <textarea id="req-notes" placeholder="추가로 전달할 내용이 있으면 적어주세요"></textarea>
    </div>

    <button class="btn-add" onclick="addToList()">+ 목록에 추가</button>
  </div>

  <!-- 요청 목록 -->
  <div class="list-side">
    <div class="list-title">
      <span>요청 목록</span>
      <span class="list-count" id="list-count">0</span>
    </div>
    <div class="list-items" id="list-items">
      <div class="list-empty" id="list-empty">추가된 품목이 없습니다.<br>왼쪽에서 품목을 입력하고<br>목록에 추가해주세요.</div>
    </div>
    <div class="send-wrap">
      <button class="btn-send" id="btn-send" onclick="sendAll()" disabled>전송하기</button>
      <div class="send-note">전송 후 이 창은 자동으로 닫힙니다.</div>
      <div class="status" id="status"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const ALLOWED_DOMAIN   = "geon.works";
const CLIENT_ID        = "666157816733-0uu1dkoda0ljjslrd479j371snkj62t7.apps.googleusercontent.com";
const EMAILJS_SERVICE  = "service_wirge1i";
const EMAILJS_TEMPLATE = "template_rorxov8";
const EMAILJS_KEY      = "HYv_Nu3sxLBNi0Yd5";

let userEmail = "";
let requestList = []; // 장바구니

// ── 인증
function init() {
  const params    = new URLSearchParams(window.location.search);
  const fromAdmin = params.get("from") === "admin";
  const authEmail = decodeURIComponent(params.get("auth") || "");

  if (fromAdmin && authEmail && authEmail.endsWith("@" + ALLOWED_DOMAIN)) {
    userEmail = authEmail;
    showApp();
    return;
  }
  const saved = sessionStorage.getItem("req-auth");
  if (saved && saved.endsWith("@" + ALLOWED_DOMAIN)) {
    userEmail = saved;
    showApp();
    return;
  }
  google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse, auto_select: false });
  google.accounts.id.renderButton(document.getElementById("g-signin-btn"),
    { type:"standard", theme:"outline", size:"large", text:"signin_with", locale:"ko" });
  google.accounts.id.prompt();
}

function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  const email   = payload.email || "";
  const domain  = email.split("@")[1] || "";
  if (domain === ALLOWED_DOMAIN) {
    userEmail = email;
    sessionStorage.setItem("req-auth", email);
    showApp();
  } else {
    document.getElementById("lock-error").textContent =
      "@" + ALLOWED_DOMAIN + " 계정만 사용할 수 있어요 (현재: " + email + ")";
    google.accounts.id.revoke(email, () => {});
  }
}

function parseJwt(token) {
  try { return JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); }
  catch { return {}; }
}

function showApp() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("user-info").textContent = userEmail;
}

// ── 목록에 추가
function addToList() {
  const cat  = document.getElementById("req-cat").value.trim();
  const name = document.getElementById("req-name").value.trim();
  if (!cat)  { alert("카테고리를 선택해주세요."); return; }
  if (!name) { alert("품목명을 입력해주세요."); return; }

  const item = {
    category:      cat,
    product_name:  name,
    option:        document.getElementById("req-opt").value.trim() || "N/A",
    brand:         document.getElementById("req-brand").value.trim() || "-",
    price:         document.getElementById("req-price").value.trim() || "-",
    barcode:       document.getElementById("req-barcode").value.trim() || "-",
    barcode2:      document.getElementById("req-barcode2").value.trim() || "-",
    location_code: document.getElementById("req-loc").value.trim() || "-",
    naver_name:    document.getElementById("req-nname").value.trim() || "-",
    naver_option:  document.getElementById("req-nopt").value.trim() || "-",
    naver_url:     document.getElementById("req-nurl").value.trim() || "-",
    shopify_url:   document.getElementById("req-surl").value.trim() || "-",
    notes:         document.getElementById("req-notes").value.trim() || "-",
  };

  requestList.push(item);
  renderList();
  clearForm();
  document.getElementById("req-cat").focus();
}

// ── 폼 초기화
function clearForm() {
  ["req-cat","req-name","req-opt","req-brand","req-price","req-barcode",
   "req-barcode2","req-loc","req-nname","req-nopt","req-nurl","req-surl","req-notes"]
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ""; });
}

// ── 목록 렌더
function renderList() {
  const container = document.getElementById("list-items");
  const empty     = document.getElementById("list-empty");
  const count     = document.getElementById("list-count");
  const sendBtn   = document.getElementById("btn-send");

  count.textContent = requestList.length;
  sendBtn.disabled  = requestList.length === 0;

  if (requestList.length === 0) {
    container.innerHTML = "";
    container.appendChild(empty);
    return;
  }
  if (empty.parentNode === container) container.removeChild(empty);

  container.innerHTML = requestList.map((item, i) => `
    <div class="list-item">
      <div class="item-cat">${item.category}</div>
      <div class="item-name">${item.product_name}</div>
      <div class="item-opt">${item.option !== "N/A" ? item.option : ""}</div>
      <button class="item-del" onclick="removeItem(${i})">×</button>
    </div>
  `).join("");
}

function removeItem(i) {
  requestList.splice(i, 1);
  renderList();
}

// ── 전체 전송 (한 이메일로)
async function sendAll() {
  if (requestList.length === 0) return;

  const btn = document.getElementById("btn-send");
  btn.disabled = true;
  btn.textContent = "전송 중...";
  setStatus("", false);

  // 여러 품목을 하나의 텍스트 블록으로 합치기
  const itemsText = requestList.map((item, i) => [
    "─────────────────────────",
    `[${i+1}] ${item.category} / ${item.product_name} / ${item.option}`,
    `브랜드: ${item.brand}  가격: ${item.price}  바코드: ${item.barcode}`,
    `보조바코드: ${item.barcode2}  위치코드: ${item.location_code}`,
    `네이버 판매명: ${item.naver_name}  옵션명: ${item.naver_option}`,
    `네이버 URL: ${item.naver_url}`,
    `쇼피파이 URL: ${item.shopify_url}`,
    item.notes !== "-" ? `특이사항: ${item.notes}` : "",
  ].filter(Boolean).join("\n")).join("\n");

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      requester:     userEmail,
      request_time:  new Date().toLocaleString("ko-KR"),
      category:      `총 ${requestList.length}건`,
      product_name:  `[일괄 요청] ${requestList.map(i => i.product_name).join(", ")}`,
      option:        "-",
      brand:         "-",
      price:         "-",
      barcode:       "-",
      barcode2:      "-",
      location_code: "-",
      naver_name:    "-",
      naver_option:  "-",
      naver_url:     "-",
      shopify_url:   "-",
      notes:         itemsText,
    }, EMAILJS_KEY);

    setStatus("✓ 전송 완료! 관리자가 확인 후 적용 예정입니다.", true);
    setTimeout(() => window.close(), 2000);
  } catch(e) {
    setStatus("전송 실패: " + JSON.stringify(e), false);
    btn.disabled = false;
    btn.textContent = "전송하기";
  }
}

function setStatus(msg, ok) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (msg ? (ok ? " ok" : " err") : "");
}

window.addEventListener("load", () => {
  if (typeof google !== "undefined") { init(); }
  else {
    const s = document.querySelector("script[src*='gsi/client']");
    if (s) s.addEventListener("load", init);
    else setTimeout(init, 1000);
  }
});
</script>
</body>
</html>
