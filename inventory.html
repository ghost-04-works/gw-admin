<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW · 재고 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
@font-face {
  font-family: 'GmarketSans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
  font-weight: 500;
}
@font-face {
  font-family: 'GmarketSans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
  font-weight: 700;
}
</style>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f8f8;
    --bg3: #f2f2f2;
    --border: #e8e8e8;
    --border2: #d4d4d4;
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --accent: #111111;
    --accent2: #333333;
    --red: #c0392b;
    --green: #2e7d32;
    --shopify: #522dd4;
    --mono: 'GmarketSans', 'Pretendard', sans-serif;
    --sans: 'Pretendard', 'Noto Sans KR', sans-serif;
    --r: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background .3s;
  }
  .dot.ok { background: #4caf50; }
  .dot.err { background: var(--red); }
  .dot.loading { background: #ff9800; animation: blink .8s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .btn-nav {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }

  .btn-refresh {
    background: var(--accent);
    border: none;
    border-radius: var(--r);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 6px 14px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn-refresh:hover { background: var(--accent2); }
  .btn-refresh:disabled { opacity: .5; cursor: default; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 24px 0;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text3); }

  .updated-at {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* ── STATS ── */
  .stats-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 24px;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .stat-dot.sellmate { background: var(--accent); }
  .stat-dot.shopify { background: var(--shopify); }
  .stat-dot.vendor { background: var(--text3); }

  .stat-item b { color: var(--text); font-size: 13px; }

  /* ── TABLE ── */
  .table-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px 60px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }

  thead tr { background: var(--bg3); border-bottom: 1px solid var(--border2); }

  th {
    padding: 10px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--text3);
    font-weight: 400;
    white-space: nowrap;
  }
  th.num { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }

  td {
    padding: 10px 14px;
    font-size: 13px;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td.num {
    text-align: right;
    font-family: var(--mono);
    font-size: 12px;
  }

  .td-product { font-weight: 500; }
  .td-variant { color: var(--text2); font-size: 12px; }
  .td-sku { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  .stock-val { font-weight: 600; }
  .stock-val.high { color: var(--green); }
  .stock-val.mid { color: #e67e22; }
  .stock-val.low { color: var(--red); }
  .stock-val.zero { color: var(--text3); }
  .stock-val.dash { color: var(--text3); font-weight: 400; }

  .vendor-cell {
    color: var(--text3);
    font-size: 12px;
    font-style: italic;
  }

  /* ── EMPTY / LOADING ── */
  .empty {
    padding: 80px 24px;
    text-align: center;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .06em;
  }
  .empty .em-icon { font-size: 32px; margin-bottom: 12px; }

  .loading-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 80px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-search {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r);
    padding: 0 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .05em;
    white-space: nowrap;
    height: 38px;
    transition: background .15s;
  }
  .btn-search:hover { background: var(--accent2); }

  .filter-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: .08em;
    margin-right: 2px;
    line-height: 28px;
  }

  .chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    background: transparent;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.on { border-color: var(--accent); color: #fff; background: var(--accent); }

  th.sortable { cursor: pointer; user-select: none; transition: background .15s, color .15s; }
  th.sortable:hover { background: #ebebeb; color: var(--text); }
  th.sortable.asc,
  th.sortable.desc { background: #e0e0e0; color: var(--text); }
  th.sortable .sort-icon { display: inline-block; width: 14px; text-align: center; opacity: .3; font-size: 10px; }
  th.sortable:hover .sort-icon { opacity: .6; }
  th.sortable.asc .sort-icon::after { content: '↑'; opacity: 1; color: var(--accent); font-size: 11px; }
  th.sortable.desc .sort-icon::after { content: '↓'; opacity: 1; color: var(--accent); font-size: 11px; }
  th.sortable:not(.asc):not(.desc) .sort-icon::after { content: '↕'; }

  .vendor-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .vendor-check input { cursor: pointer; accent-color: var(--accent); }

  .has-tip { position: relative; }
  .has-tip:hover { opacity: .8; }

  .sh-tooltip {
    display: none;
    position: fixed;
    z-index: 9999;
    background: #1a1a1a;
    color: #fff;
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.8;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    max-width: 340px;
    white-space: normal;
  }
  .sh-tooltip.visible { display: block; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .toolbar, .stats-row, .table-wrap { padding-left: 16px; padding-right: 16px; }
  }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock-screen" style="display:flex;position:fixed;inset:0;background:#ffffff;z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px;">
  <div style="font-family:'GmarketSans',sans-serif;font-size:22px;font-weight:700;letter-spacing:.12em;color:#111111;">GEON<span style="color:#999999;">.</span>inventory</div>
  <div style="font-family:'Pretendard',sans-serif;font-size:13px;color:#555555;text-align:center;line-height:1.6;">GEONWORKS 계정으로 로그인하세요<br>(@geon.works)</div>
  <div id="g-signin-btn"></div>
  <div id="lock-error" style="font-family:'Pretendard',sans-serif;font-size:12px;color:#c0392b;min-height:18px;text-align:center;"></div>
</div>

<header>
  <div class="logo">GEON<span>.</span>inventory</div>
  <div class="header-right">
    <div class="conn-badge">
      <div class="dot" id="dot-sellmate"></div>
      <span>Sellmate</span>
      <span id="time-sellmate" style="color:var(--text3);margin-left:2px;"></span>
    </div>
    <div class="conn-badge">
      <div class="dot" id="dot-shopify"></div>
      <span>Shopify</span>
      <span id="time-shopify" style="color:var(--text3);margin-left:2px;"></span>
    </div>
    <a href="index.html" class="btn-nav">← 제품 검색</a>
    <button class="btn-refresh" id="btn-refresh" onclick="loadAll()">↻ 새로고침</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="제품명 또는 옵션 검색..."
      onkeydown="if(event.key==='Enter') renderTable()">
  </div>
  <button class="btn-search" onclick="renderTable()">검색</button>
  <label class="vendor-check">
    <input type="checkbox" id="vendor-only" onchange="renderTable()">
    <span>벤더시트 품목만</span>
  </label>
</div>
<div class="filter-row" id="filter-row" style="padding: 10px 24px 0; max-width:1200px; margin:0 auto; display:flex; gap:6px; flex-wrap:wrap;">
  <span class="filter-label">CATEGORY</span>
  <button class="chip on" data-cat="all" onclick="selectCat(this)">전체</button>
</div>

<div class="stats-row" id="stats-row" style="display:none;">
  <div class="stat-item">
    <div class="stat-dot sellmate"></div>
    <span>셀메이트 <b id="stat-sellmate-count">-</b>개</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot shopify"></div>
    <span>Shopify <b id="stat-shopify-count">-</b>개 variant</span>
  </div>
</div>

<div class="table-wrap">
  <div id="loading" class="loading-wrap">
    <div class="spinner"></div>
    <span>데이터 불러오는 중...</span>
  </div>
  <div id="table-container" style="display:none;">
    <table>
      <colgroup>
        <col style="width:28%">
        <col style="width:22%">
        <col style="width:16%">
        <col style="width:12%">
        <col style="width:12%">
        <col style="width:10%">
      </colgroup>
      <thead>
        <tr>
          <th class="sortable" data-col="product_name" onclick="sortBy(this)">제품명 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="option" onclick="sortBy(this)">옵션 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="sku" onclick="sortBy(this)">SKU <span class="sort-icon"></span></th>
          <th class="num sortable" data-col="vendor_stock" onclick="sortBy(this)" style="color:#1a7a4a;">벤더시트 재고 <span class="sort-icon"></span></th>
          <th class="num sortable" data-col="shopify_stock" onclick="sortBy(this)" style="color:#522dd4;">Shopify 재고 <span class="sort-icon"></span></th>
          <th class="num sortable" data-col="sellmate_stock" onclick="sortBy(this)">셀메이트 재고 <span class="sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none;">
      <div class="em-icon">📦</div>
      <div>검색 결과가 없습니다</div>
    </div>
  </div>
</div>

<div class="sh-tooltip" id="sh-tooltip"></div>

<script>
const SUPABASE_URL = 'https://yqpskohzmnfiymjrgdxj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxcHNrb2h6bW5maXltanJnZHhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjQwMTgsImV4cCI6MjA5NDAwMDAxOH0.D75U1e8JMvVI0K2Ccq5DwOliPg_rt-2uvKse1V2fiqw';
const GOOGLE_CLIENT_ID = '666157816733-0uu1dkoda0ljjslrd479j371snkj62t7.apps.googleusercontent.com';

let sellmateData = [];
let shopifyData  = [];
let vendorData   = {};  // {normalizedSku: qty}
let mergedRows   = [];
let activeCat    = 'all';
let sortCol      = null;
let sortDir      = 'asc';
window.sheetsToken = null;
const CATEGORIES = ['switch','keycap','keyboard','stabilizer','plate','pcb','foam','deskmat','cable','bag','tool','lubricant','bumpon','other'];

// ── Google OAuth ──
window.onload = () => {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredential,
    auto_select: true,
  });

  // Sheets API용 토큰 클라이언트
  window.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
    callback: (resp) => {
      if (resp.access_token) {
        window.sheetsToken = resp.access_token;
        loadAll();
      }
    },
  });
  google.accounts.id.renderButton(document.getElementById('g-signin-btn'), {
    theme: 'outline', size: 'large', text: 'signin_with', locale: 'ko'
  });
  const saved = sessionStorage.getItem('gw_user');
  if (saved) { unlock(JSON.parse(saved)); }
};

function handleCredential(resp) {
  const payload = JSON.parse(atob(resp.credential.split('.')[1]));
  if (!payload.email || !payload.email.endsWith('@geon.works')) {
    document.getElementById('lock-error').textContent = '@geon.works 계정만 접근 가능합니다.';
    return;
  }
  sessionStorage.setItem('gw_user', JSON.stringify(payload));
  unlock(payload);
}

function unlock(payload) {
  document.getElementById('lock-screen').style.display = 'none';
  if (window.sheetsToken) {
    loadAll();
  } else {
    window.tokenClient.requestAccessToken({ prompt: '' });
  }
}

// ── 데이터 로드 ──
async function loadAll() {
  document.getElementById('btn-refresh').disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('table-container').style.display = 'none';
  document.getElementById('stats-row').style.display = 'none';

  setDot('sellmate', 'loading');
  setDot('shopify', 'loading');

  const [sm, sh, vs] = await Promise.allSettled([loadSellmate(), loadShopify(), loadVendorSheet()]);

  if (sm.status === 'fulfilled') { sellmateData = sm.value; setDot('sellmate', 'ok'); }
  else { sellmateData = []; setDot('sellmate', 'err'); console.error(sm.reason); }

  if (sh.status === 'fulfilled') { shopifyData = sh.value; setDot('shopify', 'ok'); }
  else { shopifyData = []; setDot('shopify', 'err'); console.error(sh.reason); }

  if (vs.status === 'fulfilled') { vendorData = vs.value; }
  else { vendorData = {}; console.error(vs.reason); }

  mergeData();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('table-container').style.display = 'block';
  document.getElementById('stats-row').style.display = 'flex';
  document.getElementById('btn-refresh').disabled = false;

  renderTable();
}

async function loadSellmate() {
  // Supabase products 테이블에서 재고 조회
  let all = [];
  let from = 0;
  const size = 1000;
  while (true) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/products?select=barcode,product_name,option,stock,stock_updated_at,category&is_active=eq.true&order=product_name.asc,option.asc&limit=${size}&offset=${from}`,
      { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } }
    );
    if (!res.ok) throw new Error('Sellmate fetch failed: ' + res.status);
    const data = await res.json();
    all = all.concat(data);
    if (data.length < size) break;
    from += size;
  }
  document.getElementById('stat-sellmate-count').textContent = all.length.toLocaleString();
  // stock_updated_at 최신값 표시
  const times = all.map(r => r.stock_updated_at).filter(Boolean).sort().reverse();
  if (times.length) {
    const d = new Date(times[0]);
    const t = d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('time-sellmate').textContent = t;
  }
  return all;
}

async function loadShopify() {
  const res = await fetch(
    `${SUPABASE_URL}/functions/v1/shopify-inventory`,
    { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } }
  );
  if (!res.ok) throw new Error('Shopify fetch failed: ' + res.status);
  const data = await res.json();
  document.getElementById('stat-shopify-count').textContent = data.length.toLocaleString();
  const now = new Date();
  document.getElementById('time-shopify').textContent = now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  return data;
}

async function loadVendorSheet() {
  if (!window.sheetsToken) return {};
  const SHEET_ID = '1HPMf_NMmO5KN8nH-iv7oII0NqYiDADf7O9G_Kp8HkYE';
  const RANGE = 'PRICELIST!A6:M';  // 6행부터 M열까지

  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}`,
    { headers: { Authorization: 'Bearer ' + window.sheetsToken } }
  );
  if (!res.ok) throw new Error('Sheets fetch failed: ' + res.status);
  const data = await res.json();
  const rows = data.values || [];

  const normKey = s => (s || '').replace(/-/g, '').toUpperCase().trim();
  const result = {};

  for (const row of rows) {
    const qtyRaw  = (row[5] || '').trim();   // F열 (index 5) - 수량
    const skuRaw  = (row[12] || '').trim();  // M열 (index 12) - SKU

    if (!skuRaw || !qtyRaw) continue;

    // / 로 분리
    const skus = skuRaw.split('/').map(s => s.trim()).filter(Boolean);
    const qtys = qtyRaw.split('/').map(s => s.trim()).filter(Boolean);

    // each: 모든 SKU에 같은 수량 (qtys[0] 적용)
    // Variable: 텍스트 그대로
    for (let i = 0; i < skus.length; i++) {
      const sku = skus[i];
      if (!sku || sku === '-') continue;

      const rawQty = (qtys[i] || qtys[0] || '').trim();
      const qtyStr = rawQty.toLowerCase().replace(/,/g, '');

      let qty;  // undefined 아닌 명시적 값으로 구분
      if (!qtyStr || qtyStr === '-') {
        qty = 0;  // - 는 0으로
      } else if (qtyStr === 'variable') {
        qty = 'Variable';  // 텍스트 그대로
      } else if (qtyStr === 'each') {
        // each: qtys[0] 수량을 모든 SKU에 적용
        const baseStr = (qtys[0] || '').toLowerCase().replace(/,/g, '');
        if (baseStr.endsWith('k')) qty = Math.round(parseFloat(baseStr) * 1000);
        else qty = parseInt(baseStr) || 0;
      } else if (qtyStr.endsWith('k')) {
        qty = Math.round(parseFloat(qtyStr) * 1000);
      } else {
        qty = parseInt(qtyStr) ?? 0;
      }

      result[normKey(sku)] = qty;
    }
  }

  return result;
}

// ── 데이터 합산 ──
function mergeData() {
  const normKey = s => (s || '').replace(/-/g, '').toUpperCase();

  // Shopify: SKU 기준으로 재고 합산 + 페이지별 상세 보관
  const shMap = {};
  for (const sh of shopifyData) {
    const key = normKey(sh.sku);
    if (!key) continue;
    if (!shMap[key]) {
      shMap[key] = { total: 0, details: [] };
    }
    shMap[key].total += sh.inventory;
    shMap[key].details.push({
      title: sh.product_title,
      variant: sh.variant_title === 'Default Title' ? '' : sh.variant_title,
      qty: sh.inventory
    });
  }

  // 셀메이트 기준으로 row 생성
  const rows = [];
  const usedKeys = new Set();

  for (const sm of sellmateData) {
    const key = normKey(sm.barcode);
    usedKeys.add(key);
    const sh = shMap[key] || null;
    rows.push({
      product_name: sm.product_name,
      option: sm.option,
      sku: sm.barcode || '',
      shopify_stock: sh ? sh.total : null,
      shopify_details: sh ? sh.details : [],
      sellmate_stock: sm.stock,
      category: sm.category || '',
      vendor_stock: normKey(sm.barcode) in vendorData ? vendorData[normKey(sm.barcode)] : null,
    });
  }

  // Shopify에만 있는 제품 (셀메이트에 없는 것)
  for (const sh of shopifyData) {
    const key = normKey(sh.sku);
    if (!key || usedKeys.has(key)) continue;
    usedKeys.add(key);
    const shEntry = shMap[key];
    rows.push({
      product_name: sh.product_title,
      option: sh.variant_title === 'Default Title' ? '-' : sh.variant_title,
      sku: sh.sku || '',
      shopify_stock: shEntry ? shEntry.total : sh.inventory,
      shopify_details: shEntry ? shEntry.details : [],
      sellmate_stock: null,
      category: '',
      vendor_stock: key in vendorData ? vendorData[key] : null,
    });
  }

  mergedRows = rows;
  renderCategoryChips();
}

function renderCategoryChips() {
  const cats = [...new Set(mergedRows.map(r => r.category).filter(Boolean))].sort();
  const row = document.getElementById('filter-row');
  // 전체 버튼만 남기고 나머지 제거
  row.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(el => el.remove());
  for (const cat of cats) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = function() { selectCat(this); };
    row.appendChild(btn);
  }
}

function selectCat(el) {
  document.querySelectorAll('#filter-row .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeCat = el.dataset.cat;
  renderTable();
}

// ── 테이블 렌더 (DocumentFragment + rAF) ──
function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const vendorOnly = document.getElementById('vendor-only')?.checked;
  let rows = mergedRows;
  if (activeCat && activeCat !== 'all') {
    rows = rows.filter(r => r.category === activeCat);
  }
  if (vendorOnly) {
    rows = rows.filter(r => r.vendor_stock !== null && r.vendor_stock !== undefined);
  }
  if (q) {
    rows = rows.filter(r =>
      (r.product_name || '').toLowerCase().includes(q) ||
      (r.option || '').toLowerCase().includes(q) ||
      (r.sku || '').toLowerCase().includes(q)
    );
  }
  if (sortCol) {
    rows = [...rows].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === 'number' && typeof vb === 'number')
        return sortDir === 'asc' ? va - vb : vb - va;
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
      return sortDir === 'asc' ? va.localeCompare(vb,'ko') : vb.localeCompare(va,'ko');
    });
  }

  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // DocumentFragment로 한 번에 DOM에 붙이기
  requestAnimationFrame(() => {
    const frag = document.createDocumentFragment();
    for (const r of rows) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-product">${esc(r.product_name)}</td>
        <td class="td-variant">${esc(r.option)}</td>
        <td class="td-sku">${esc(r.sku) || '<span style="color:var(--text3)">—</span>'}</td>
        <td class="num">${stockBadge(r.vendor_stock, 'vendor')}</td>
        <td class="num">${shopifyBadge(r.shopify_stock, r.shopify_details)}</td>
        <td class="num">${stockBadge(r.sellmate_stock, 'sellmate')}</td>
      `;
      frag.appendChild(tr);
    }
    tbody.innerHTML = '';
    tbody.appendChild(frag);
  });
}

function initScrollListener() {}

function shopifyBadge(val, details) {
  if (val === null || val === undefined) return '<span style="color:var(--text3)">—</span>';
  const n = Number(val);
  let cls = 'dash';
  if (n > 100) cls = 'high';
  else if (n > 20) cls = 'mid';
  else if (n > 0) cls = 'low';
  else cls = 'zero';

  if (!details || details.length <= 1) {
    return `<span class="stock-val ${cls}" style="color:#522dd4">${n.toLocaleString()}</span>`;
  }

  // 여러 페이지 합산인 경우 커스텀 툴팁
  const tipData = JSON.stringify(details).replace(/"/g, '&quot;');
  return `<span class="stock-val ${cls} has-tip" style="color:#522dd4;cursor:pointer;border-bottom:1px dashed #522dd4;"
    data-details="${tipData}"
    onmouseenter="showTooltip(event, this)"
    onmouseleave="hideTooltip()"
    onmousemove="moveTooltip(event)"
    >${n.toLocaleString()} <span style="font-size:10px;opacity:.6">(${details.length})</span></span>`;
}

function stockBadge(val, source) {
  if (val === null || val === undefined) return '<span style="color:var(--text3)">—</span>';
  if (val === 'Variable') return '<span style="color:var(--text3);font-style:italic;font-size:11px;">Variable</span>';
  const n = Number(val);
  let cls = 'dash';
  if (n > 100) cls = 'high';
  else if (n > 20) cls = 'mid';
  else if (n > 0) cls = 'low';
  else cls = 'zero';
  let color = '';
  if (source === 'shopify') color = ';color:#522dd4';
  else if (source === 'vendor') color = ';color:#1a7a4a';
  return `<span class="stock-val ${cls}" style="${color}">${n.toLocaleString()}</span>`;
}

function setDot(id, state) {
  const dot = document.getElementById('dot-' + id);
  dot.className = 'dot ' + state;
}

function sortBy(th) {
  const col = th.dataset.col;
  // 같은 컬럼 재클릭: asc → desc → null(기본)
  if (sortCol === col) {
    if (sortDir === 'asc') sortDir = 'desc';
    else { sortCol = null; sortDir = 'asc'; }
  } else {
    sortCol = col;
    sortDir = 'asc';
  }

  // 헤더 클래스 초기화
  document.querySelectorAll('th.sortable').forEach(t => {
    t.classList.remove('asc', 'desc');
  });
  if (sortCol) {
    th.classList.add(sortDir);
  }

  renderTable();
}

function showTooltip(e, el) {
  const details = JSON.parse(el.dataset.details);
  const tip = document.getElementById('sh-tooltip');
  tip.innerHTML = details.map(d =>
    '<span style="color:#aaa">' + esc(d.title) + (d.variant ? ' · ' + esc(d.variant) : '') + '</span><br>' +
    '<span style="color:#fff;font-size:13px;font-weight:700">' + d.qty.toLocaleString() + '</span>'
  ).join('<hr style="border:none;border-top:1px solid #333;margin:5px 0">');
  tip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tip = document.getElementById('sh-tooltip');
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const tipW = tip.offsetWidth;
  const tipH = tip.offsetHeight;
  tip.style.left = (x + tipW > window.innerWidth ? x - tipW - 28 : x) + 'px';
  tip.style.top = (y + tipH > window.innerHeight ? y - tipH - 28 : y) + 'px';
}

function hideTooltip() {
  document.getElementById('sh-tooltip').classList.remove('visible');
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
